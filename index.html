<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="themeColorMeta" content="#FAF8F4">
<title>My Port — Portfolio Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<link rel="preconnect" href="https://eodhd.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<!-- ย้าย Chart.js มาไว้ที่นี่และเพิ่ม defer เพื่อโหลดขนานตั้งแต่เริ่มแรก ลดเวลาบล็อกเรนเดอร์หน้าจอ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" defer></script>
<style>
  :root {
    --ink: #0E1116;
    --ink-soft: #4A5160;
    --paper: #FAF8F4;
    --paper-raised: #FFFFFF;
    --line: #E4E0D8;
    --gain: #1B7A4D;
    --gain-soft: #E6F4EC;
    --loss: #B23B2E;
    --loss-soft: #FBEAE7;
    --accent: #C98A2C;
    --accent-soft: #F6ECD9;
    --accent-text: #7A5414;
    --accent-border: #E5C98A;
    --accent-dark: #0E1116;
    --accent-dark-text: #FAF8F4;
    --hero-bg: var(--paper-raised);
    --hero-text: var(--ink);
    --hero-text-dim: var(--ink-soft);
    --hero-border: var(--line);
    --hero-chip-bg: rgba(14,17,22,0.05);
    --hero-chip-border: rgba(14,17,22,0.08);
    --hero-chip-active-bg: var(--ink);
    --hero-chip-active-text: var(--paper-raised);
    --hero-gain-text: var(--gain);
    --hero-loss-text: var(--loss);
    --hero-gain-bg: var(--gain-soft);
    --hero-loss-bg: var(--loss-soft);
    --skel-shine: #ECE8DE;
    --mono: 'JetBrains Mono', 'SF Mono', 'IBM Plex Mono', ui-monospace, monospace;
    --serif: 'Fraunces', 'Source Serif Pro', 'Iowan Old Style', Georgia, serif;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
    --shadow-sm: 0 1px 2px rgba(14,17,22,0.04), 0 1px 1px rgba(14,17,22,0.03);
    --shadow-md: 0 8px 24px -8px rgba(14,17,22,0.12), 0 2px 6px -2px rgba(14,17,22,0.06);
    --shadow-lg: 0 20px 48px -12px rgba(14,17,22,0.22), 0 6px 16px -6px rgba(14,17,22,0.1);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 22px;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --ink: #ECE9E2;
      --ink-soft: #8B92A0;
      --paper: #121316;
      --paper-raised: #1C1E23;
      --line: #2A2D33;
      --gain: #3DBE7C;
      --gain-soft: #16291E;
      --loss: #E8645A;
      --loss-soft: #2E1916;
      --accent: #D9A655;
      --accent-soft: #2B2316;
      --accent-text: #E0C088;
      --accent-border: #4A3D24;
      --skel-shine: #2A2D33;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 8px 24px -8px rgba(0,0,0,0.45), 0 2px 6px -2px rgba(0,0,0,0.3);
      --shadow-lg: 0 24px 56px -16px rgba(0,0,0,0.6), 0 8px 20px -8px rgba(0,0,0,0.4);
      --hero-bg: var(--accent-dark);
      --hero-text: var(--accent-dark-text);
      --hero-text-dim: rgba(250,248,244,0.55);
      --hero-border: rgba(250,248,244,0.1);
      --hero-chip-bg: rgba(250,248,244,0.1);
      --hero-chip-border: rgba(250,248,244,0.08);
      --hero-chip-active-bg: var(--accent-dark-text);
      --hero-chip-active-text: var(--accent-dark);
      --hero-gain-text: #7CDDA8;
      --hero-loss-text: #F1A89E;
      --hero-gain-bg: rgba(60,190,120,0.2);
      --hero-loss-bg: rgba(232,100,90,0.2);
    }
  }
  :root[data-theme="dark"] {
    --ink: #ECE9E2;
    --ink-soft: #8B92A0;
    --paper: #121316;
    --paper-raised: #1C1E23;
    --line: #2A2D33;
    --gain: #3DBE7C;
    --gain-soft: #16291E;
    --loss: #E8645A;
    --loss-soft: #2E1916;
    --accent: #D9A655;
    --accent-soft: #2B2316;
    --accent-text: #E0C088;
    --accent-border: #4A3D24;
    --skel-shine: #2A2D33;
    --hero-bg: var(--accent-dark);
    --hero-text: var(--accent-dark-text);
    --hero-text-dim: rgba(250,248,244,0.55);
    --hero-border: rgba(250,248,244,0.1);
    --hero-chip-bg: rgba(250,248,244,0.1);
    --hero-chip-border: rgba(250,248,244,0.08);
    --hero-chip-active-bg: var(--accent-dark-text);
    --hero-chip-active-text: var(--accent-dark);
    --hero-gain-text: #7CDDA8;
    --hero-loss-text: #F1A89E;
    --hero-gain-bg: rgba(60,190,120,0.2);
    --hero-loss-bg: rgba(232,100,90,0.2);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 8px 24px -8px rgba(0,0,0,0.45), 0 2px 6px -2px rgba(0,0,0,0.3);
    --shadow-lg: 0 24px 56px -16px rgba(0,0,0,0.6), 0 8px 20px -8px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding-bottom: 90px;
    min-height: 100vh;
  }

  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--line);
    padding: max(16px, env(safe-area-inset-top)) 20px 12px;
  }
  .topbar-row {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .topbar-actions { display: flex; align-items: center; gap: 2px; }
  .topbar-actions button {
    transition: transform .15s ease, background-color .15s ease;
    border-radius: 50%;
  }
  .topbar-actions button:active { transform: scale(0.88); background: var(--line); }
  .brand {
    font-family: var(--serif);
    font-size: 23px;
    font-weight: 600;
    letter-spacing: -0.015em;
  }
  .brand .dot { color: var(--accent); }
  .port-switch {
    display: flex; gap: 7px; margin-top: 14px;
    overflow-x: auto;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .port-switch::-webkit-scrollbar { display: none; }
  .port-chip {
    flex: 0 0 auto;
    padding: 7px 15px;
    border-radius: 100px;
    border: 1px solid var(--line);
    background: var(--paper-raised);
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all .18s cubic-bezier(.4,0,.2,1);
  }
  .port-chip:active { transform: scale(0.96); }
  .port-chip.active {
    background: var(--accent-dark);
    color: var(--accent-dark-text);
    border-color: var(--accent-dark);
    box-shadow: var(--shadow-sm);
  }

  .section { padding: 22px 20px 0; }
  .section-label {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .section-label-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-label-row .section-label { margin-bottom: 0; }
  .basis-toggle-inline {
    display: flex; background: var(--line);
    border-radius: 100px; padding: 2px;
  }
  .basis-btn-inline {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.02em;
    padding: 4px 9px; border-radius: 100px; color: var(--ink-soft);
    cursor: pointer; transition: all .15s ease;
  }
  .basis-btn-inline.active { background: var(--paper-raised); color: var(--ink); }

.hero-card {
    /* ลบ radial-gradient ออก หรือปรับค่า alpha (0.35, 0.12) ให้เป็น 0 เพื่อยกเลิกความจาง */
    background: var(--hero-bg); /* ปรับตามธีมสว่าง/มืด */
    color: var(--hero-text);
    border: 1px solid var(--hero-border);
    border-radius: var(--radius-lg);
    padding: 26px 22px 22px;
    position: relative;
    z-index: 0;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    transition: background-color .2s ease, color .2s ease, border-color .2s ease;
  }
  .hero-bg-chart {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 35%;
    z-index: -1;
    opacity: 0.40;
    pointer-events: none;
  }
  .hero-label {
    font-size: 12px; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--hero-text-dim); margin-bottom: 7px; font-weight: 600;
  }
  .hero-value {
    font-family: var(--mono);
    font-size: 40px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.08;
  }
  .hero-value .cents { font-size: 22px; opacity: 0.55; }
  .hero-delta {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 11px;
    font-family: var(--mono);
    font-size: 14px; font-weight: 600;
    padding: 4px 10px 4px 8px;
    border-radius: 100px;
    backdrop-filter: blur(4px);
  }
  .hero-delta.up { background: var(--hero-gain-bg); color: var(--hero-gain-text); }
  .hero-delta.down { background: var(--hero-loss-bg); color: var(--hero-loss-text); }
  .hero-daily {
    font-family: var(--mono);
    font-size: 12px; margin-top: 9px;
    color: var(--hero-text-dim);
  }
  .hero-daily b { font-weight: 600; }
  .hero-daily.up b { color: var(--hero-gain-text); }
  .hero-daily.down b { color: var(--hero-loss-text); }

  .basis-toggle {
    display: flex; background: var(--hero-chip-bg);
    border: 1px solid var(--hero-chip-border);
    border-radius: 100px; padding: 3px;
    margin-bottom: 16px;
    width: fit-content;
    max-width: 100%;
    overflow-x: auto;
  }
  .basis-btn {
    font-size: 11px; font-weight: 700; letter-spacing: 0.01em;
    padding: 6px 11px; border-radius: 100px; color: var(--hero-text-dim);
    cursor: pointer; transition: all .18s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
  }
  .basis-btn.active { background: var(--hero-chip-active-bg); color: var(--hero-chip-active-text); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

  .hero-foot {
    display: flex; gap: 14px; margin-top: 19px;
    padding-top: 17px; border-top: 1px solid var(--hero-border);
    flex-wrap: wrap; /* ป้องกันเนื้อหาถูกบีบ */
  }
  .hero-foot-item { flex: 1; min-width: 0; }
  .hero-foot-label { font-size: 10.5px; color: var(--hero-text-dim); margin-bottom: 3px; line-height: 1.4; } /* เอา nowrap ออก */
  .hero-foot-value { font-family: var(--mono); font-size: 14px; font-weight: 600; word-break: break-word; } /* เอา nowrap ออก */

  .alloc-row-wrap {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    margin-bottom: 9px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s ease, transform .15s ease;
  }
  .alloc-row-wrap:active { transform: scale(0.992); }
  .alloc-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 14px 4px;
  }
  .alloc-target-block {
    padding: 4px 14px 14px;
  }
  .alloc-icon {
    width: 38px; height: 38px; border-radius: 50%;
    flex: 0 0 auto;
    overflow: hidden;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 1px var(--line);
  }
  .alloc-icon img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .alloc-icon-fallback {
    width: 100%; height: 100%;
    color: #fff; font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .alloc-mid { flex: 1; min-width: 0; }
  .alloc-ticker-row { display: flex; align-items: baseline; gap: 8px; }
  .alloc-ticker { font-weight: 700; font-size: 14.5px; font-family: var(--mono); }
  .alloc-current-price { font-size: 12px; color: var(--ink-soft); font-family: var(--mono); }
.alloc-cost-row { font-size: 11px; color: var(--ink-soft); font-family: var(--mono); margin-top: 2px; }
.alloc-cost-total { font-size: 10.5px; color: var(--ink-soft); font-family: var(--mono); margin-top: 2px; }

  .alloc-bar-track { height: 4px; background: var(--line); border-radius: 4px; margin-top: 6px; overflow: hidden; position: relative; }
  .alloc-bar-fill { height: 100%; border-radius: 4px; }
  .alloc-pct-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .alloc-pct { font-size: 11.5px; color: var(--ink-soft); font-family: var(--mono); }

  .alloc-target-summary-text {
    font-size: 11.5px; color: var(--ink-soft); font-family: var(--mono);
    margin-top: 6px;
    white-space: nowrap;
    overflow-x: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .alloc-target-summary-text::-webkit-scrollbar { display: none; }
  .alloc-target-summary-text b { color: var(--ink); }
  .alloc-room-bar-track {
    height: 7px; background: var(--line); border-radius: 4px;
    margin-top: 5px; overflow: hidden;
  }
  .alloc-room-bar-fill { height: 100%; border-radius: 4px; transition: width .2s ease; }
  .alloc-target-footer-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px; gap: 8px; flex-wrap: wrap; /* ป้องกันการบีบข้อความเมื่อแคบ */
  }
  .alloc-target-room-label { font-size: 10.5px; color: var(--ink-soft); }
  .alloc-target-over-label { font-size: 10.5px; color: var(--loss); font-weight: 700; }

  .alloc-target-add-btn, .alloc-target-edit-btn, .alloc-target-save-btn {
    font-size: 10.5px; font-weight: 700;
    color: var(--accent-text); background: var(--accent-soft);
    border: 1px solid var(--accent-border); border-radius: 100px;
    padding: 2px 9px; cursor: pointer; white-space: nowrap;
  }
  .alloc-target-save-btn { padding: 7px 12px; font-size: 13px; flex: 0 0 auto; }

  .alloc-target-lock-btn {
    display: flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--paper);
    color: var(--ink-soft); font-size: 11.5px; cursor: pointer;
    transition: all .15s ease; flex: 0 0 auto;
  }
  .alloc-target-lock-btn.locked {
    background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent-text);
  }
  .alloc-locked-tag {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 700; color: var(--accent-text);
    background: var(--accent-soft); border-radius: 100px; padding: 1px 7px;
  }

  .alloc-target-input-row {
    display: flex; align-items: center; gap: 6px;
    margin-top: 8px;
  }

  .alloc-target-compare {
    font-size: 10.5px; font-weight: 700; font-family: var(--mono);
    padding: 1px 7px; border-radius: 100px;
  }
  .alloc-target-compare.ontarget { background: var(--gain-soft); color: var(--gain); }
  .alloc-target-compare.over { background: var(--loss-soft); color: var(--loss); }
  .alloc-target-compare.under { background: var(--line); color: var(--ink-soft); }

  .alloc-sum-bar {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    background: var(--paper-raised); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 11px;
    box-shadow: var(--shadow-sm);
  }
  .alloc-sum-label { font-size: 12.5px; color: var(--ink-soft); font-family: var(--mono); }
  .alloc-sum-label b { color: var(--ink); }
  .alloc-sum-status {
    font-size: 11.5px; font-weight: 700; font-family: var(--mono);
    padding: 3px 10px; border-radius: 100px;
  }
  .alloc-sum-status.ontarget { background: var(--gain-soft); color: var(--gain); }
  .alloc-sum-status.over { background: var(--loss-soft); color: var(--loss); }
  .alloc-sum-status.under { background: var(--accent-soft); color: var(--accent-text); }
  .alloc-normalize-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11.5px; font-weight: 700; color: var(--accent-dark-text);
    background: var(--accent-dark); border: none; border-radius: 100px;
    padding: 5px 10px; cursor: pointer; white-space: nowrap;
    transition: transform .12s ease;
  }
  .alloc-normalize-btn:active { transform: scale(0.94); }
  .dca-calc-suffix { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .dca-alloc-projection {
    margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--accent-border);
    font-size: 12px; color: var(--ink-soft); font-family: var(--mono);
  }
  .dca-alloc-projection b { color: var(--ink); }
  .alloc-right { text-align: right; flex: 0 0 auto; }
  .alloc-value { font-family: var(--mono); font-size: 14px; font-weight: 600; }
  .alloc-gain { font-family: var(--mono); font-size: 12px; font-weight: 600; margin-top: 2px; }
  .alloc-gain.up { color: var(--gain); }
  .alloc-gain.down { color: var(--loss); }

  .dca-calc {
    border-top: 1px solid var(--line);
    background: var(--accent-soft);
    padding: 10px 14px;
  }
  .dca-calc-input-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .dca-calc-label {
    font-size: 12px; font-weight: 600; color: var(--accent-text); line-height: 1.3; /* เอา nowrap ออก */
  }
  .dca-calc-input, .alloc-target-input {
    flex: 1; min-width: 0;
    padding: 7px 10px;
    border-radius: 8px; border: 1px solid var(--accent-border);
    font-size: 16px; font-family: var(--mono);
    background: var(--paper-raised); color: var(--ink);
  }
  .dca-calc-input:focus, .alloc-target-input:focus { outline: none; border-color: var(--accent); }
  .dca-calc-result {
    font-size: 12px; margin-top: 7px; color: var(--ink-soft); font-family: var(--mono);
  }
  .dca-calc-result b { color: var(--ink); font-weight: 700; }
  .dca-calc-drop { font-weight: 600; margin-left: 6px; }
  .dca-calc-drop.down { color: var(--gain); }
  .dca-calc-drop.up { color: var(--loss); }
  .dca-calc-hint { color: var(--ink-soft); }
  .dca-current {
    font-size: 12px; color: var(--ink-soft); margin-bottom: 4px;
  }
  .dca-current b { color: var(--ink); font-weight: 700; }

  .txn-date-group { margin-bottom: 4px; }
  .txn-date-header {
    font-size: 11.5px; font-weight: 700; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 12px 0 6px;
  }
  .txn-date-group:first-child .txn-date-header { padding-top: 4px; }
  .txn-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .txn-date-group:last-child .txn-row:last-child { border-bottom: none; }
  .txn-badge {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex: 0 0 auto;
  }
  .txn-badge.buy { background: var(--gain-soft); color: var(--gain); }
  .txn-badge.sell { background: var(--loss-soft); color: var(--loss); }
  .txn-mid { flex: 1; min-width: 0; }
  .txn-stock { font-weight: 700; font-size: 14.5px; }
  .txn-date { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }
  .txn-right { text-align: right; }
  .txn-amount { font-family: var(--mono); font-weight: 600; font-size: 14px; }
  .txn-shares { font-size: 11.5px; color: var(--ink-soft); font-family: var(--mono); }
  .txn-delete {
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 8px; border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 15px;

</style>

<script>
const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbxqrfTAipQFjum4jBuPHVBALqpo1t_QrN9G60RV1VblmG877lWJB6Fc6VAIqjzxtAew/exec';

const urlParam = new URLSearchParams(window.location.search).get('api');
if (urlParam) {
  localStorage.setItem('portfolio_api_url', urlParam);
}
let API_URL = urlParam || localStorage.getItem('portfolio_api_url') || DEFAULT_API_URL;

const savedTheme = localStorage.getItem('portfolio_theme');
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
}
function updateThemeIcon() {
  const current = document.documentElement.getAttribute('data-theme');
  const isDark = current === 'dark' ||
    (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.getElementById('themeToggleBtn').innerHTML = isDark ? '<i class="ti ti-sun"></i>' : '<i class="ti ti-moon"></i>';
  document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#121316' : '#FAF8F4');
}

const state = {
  port: 'ALL',
  basis: 'AVG',
  valueMode: 'market',
  summary: null,
  dashboard: null,
  transactions: [],
  ports: [],
  history: [],
  dcaInputs: {},
  allocTargets: JSON.parse(localStorage.getItem('portfolio_alloc_targets') || '{}'),
  allocLocked: JSON.parse(localStorage.getItem('portfolio_alloc_locked') || '{}')
};

function saveAllocLocked() {
  localStorage.setItem('portfolio_alloc_locked', JSON.stringify(state.allocLocked));
}

function saveAllocTargets() {
  localStorage.setItem('portfolio_alloc_targets', JSON.stringify(state.allocTargets));
}

const fmt = (n, decimals=2) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
};
const fmtPct = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n * 100 >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%';
};

function showSetupBanner(errorMsg) {
  const el = document.getElementById('setupBanner');
  el.innerHTML = `
    <div class="setup-banner">
      ${errorMsg ? '⚠️ ' + errorMsg + '<br><br>' : ''}วาง <strong>Web App URL</strong> จาก Apps Script ที่ deploy ไว้ที่นี่
      (ลงท้ายด้วย <code>/exec</code>)
      <div class="url-input-row">
        <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/xxxx/exec" value="${API_URL || ''}">
        <button id="apiUrlClear" type="button" title="ลบลิงก์ที่บันทึกไว้ และกลับไปใช้ค่าเริ่มต้น">✕</button>
      </div>
      <button id="apiUrlSave">บันทึกและเชื่อมต่อ</button>
      <div class="setup-hint">💡 หลังบันทึกแล้ว แนะนำให้ลบ icon บนหน้าจอโฮมเดิม แล้วทำ "Add to Home Screen" ใหม่อีกครั้ง เพื่อให้ icon จำ URL นี้ไว้แบบถาวร ไม่หายแม้ Safari จะล้างข้อมูลแอพที่ไม่ได้เปิดนาน ๆ</div>
    </div>`;
  document.getElementById('apiUrlSave').onclick = () => {
    const val = document.getElementById('apiUrlInput').value.trim();
    if (val) {
      localStorage.setItem('portfolio_api_url', val);
      API_URL = val;
      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set('api', val);
      history.replaceState(null, '', newUrl.toString());
      el.innerHTML = '';
      loadAll();
    }
  };
  document.getElementById('apiUrlClear').onclick = () => {
    document.getElementById('apiUrlInput').value = '';
    document.getElementById('apiUrlInput').focus();
    localStorage.removeItem('portfolio_api_url');
    const clearedUrl = new URL(window.location.href);
    clearedUrl.searchParams.delete('api');
    history.replaceState(null, '', clearedUrl.toString());
  };
}

document.getElementById('settingsBtn').onclick = () => showSetupBanner();

document.getElementById('themeToggleBtn').onclick = () => {
  const current = document.documentElement.getAttribute('data-theme');
  const isDark = current === 'dark' ||
    (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('portfolio_theme', next);
  updateThemeIcon();
  renderHeroBgChart();
  renderBarChart();
};

async function api(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => { if (v !== null) url.searchParams.set(k, v); });
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function loadAll() {
  if (!API_URL) { showSetupBanner(); return; }

  const MAX_ATTEMPTS = 3;
  const RETRY_DELAY_MS = [1500, 3000];

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      // เรียก action="all_data" เพียง request เดียว แทนที่จะยิง 6 requests แยกกัน
      // (Apps Script มักคิว requests พร้อมกันไปที่สคริปต์เดียวกัน ทำให้ Promise.all ไม่ได้เร็วขึ้นจริง)
      const all = await api('all_data', { port: state.port === 'ALL' ? null : state.port });
      if (all.error) throw new Error(all.error);

      const { summary, dashboard, ports, transactions: txns, history, allocTargets: allocTargetsRes } = all;
      if (summary.error || dashboard.error || ports.error || txns.error) {
        const errMsg = summary.error || dashboard.error || ports.error || txns.error;
        throw new Error(errMsg);
      }
      state.summary = summary;
      state.dashboard = dashboard;
      state.ports = ports.ports || [];
      state.transactions = txns.rows || [];
      state.history = (history && history.rows) || [];
      if (allocTargetsRes && !allocTargetsRes.error) {
        state.allocTargets = allocTargetsRes.targets || {};
        saveAllocTargets();
        if (allocTargetsRes.locked) {
          state.allocLocked = allocTargetsRes.locked;
          saveAllocLocked();
        }
      }
      renderPortSwitch();
      renderHero();
      renderHeroBgChart();
      renderBarChart();
      renderAllocList();
      renderTransactions();
      populatePortSelect();
      cacheSnapshot();
      return;
    } catch (err) {
      console.error(`loadAll attempt ${attempt} failed:`, err);
      if (attempt < MAX_ATTEMPTS) {
        if (!state.summary) {
          document.getElementById('allocList').innerHTML =
            `<div class="empty-state"><div class="icon">⏳</div><div class="msg">กำลังเชื่อมต่อใหม่... (ครั้งที่ ${attempt + 1})</div></div>`;
        }
        await new Promise(r => setTimeout(r, RETRY_DELAY_MS[attempt - 1]));
        continue;
      }
      if (!state.summary) {
        document.getElementById('allocList').innerHTML =
          `<div class="empty-state"><div class="icon"><i class="ti ti-alert-triangle"></i></div><div class="msg">โหลดข้อมูลไม่สำเร็จ: ${err.message}<br><br>กดปุ่ม ⚙ ด้านบนเพื่อตรวจสอบ/แก้ไข URL</div></div>`;
      }
      showSetupBanner('เชื่อมต่อไม่สำเร็จ: ' + err.message + ' — ตรวจสอบว่า URL ถูกต้อง และตอน Deploy เลือก "Who has access: Anyone" แล้ว');
    }
  }
}

// เก็บ snapshot ล่าสุดไว้ใน localStorage เพื่อเปิดแอพครั้งถัดไปแล้วแสดงผลได้ทันที
// (ไม่ต้องรอ network) แล้วค่อยรีเฟรชด้วยข้อมูลสดจาก server ทับอีกที
const SNAPSHOT_KEY = 'portfolio_snapshot_v1';
function cacheSnapshot() {
  try {
    localStorage.setItem(SNAPSHOT_KEY, JSON.stringify({
      summary: state.summary,
      dashboard: state.dashboard,
      ports: state.ports,
      transactions: state.transactions,
      history: state.history,
      ts: Date.now()
    }));
  } catch (err) {
    console.error('cacheSnapshot failed:', err);
  }
}

function renderFromSnapshot() {
  try {
    const raw = localStorage.getItem(SNAPSHOT_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    if (!snap || !snap.summary) return false;
    state.summary = snap.summary;
    state.dashboard = snap.dashboard;
    state.ports = snap.ports || [];
    state.transactions = snap.transactions || [];
    state.history = snap.history || [];
    renderPortSwitch();
    renderHero();
    renderHeroBgChart();
    renderBarChart();
    renderAllocList();
    renderTransactions();
    populatePortSelect();
    return true;
  } catch (err) {
    console.error('renderFromSnapshot failed:', err);
    return false;
  }
}

function renderPortSwitch() {
  const el = document.getElementById('portSwitch');
  const ports = ['ALL', ...state.ports];
  el.innerHTML = ports.map(p =>
    `<div class="port-chip ${p === state.port ? 'active' : ''}" data-port="${p}">${p === 'ALL' ? 'ทั้งหมด' : p}</div>`
  ).join('');
  el.querySelectorAll('.port-chip').forEach(chip => {
    chip.onclick = () => {
      state.port = chip.dataset.port;
      loadAll();
    };
  });
}

function rerenderForBasisOrPort() {
  renderHero();
  renderAllocList();
  renderBarChart();
}

function getFilteredSummaryRows() {
  if (!state.summary) return [];
  const rows = state.summary.rows.filter(r => r['หุ้น'] !== 'USD');
  if (state.port === 'ALL') return rows;
  return rows.filter(r => r['ชื่อ port'] === state.port);
}

function getCashBalance() {
  if (!state.summary) return 0;
  return state.summary.rows
    .filter(r => r['หุ้น'] === 'USD')
    .reduce((sum, r) => sum + (Number(r['มูลค่าปัจจุบัน']) || 0), 0);
}

function renderHero() {
  const rows = getFilteredSummaryRows();
  let marketValue = 0, costValue = 0;

  rows.forEach(r => {
    marketValue += Number(r['มูลค่าปัจจุบัน']) || 0;
    costValue += Number(r['ทุน  FIFO']) || 0;
  });

  const principal = getCashBalance();
  const isMarket = state.valueMode === 'market';
  const displayValue = isMarket ? marketValue : costValue;

  document.getElementById('heroLabel').textContent = isMarket ? 'Current Value · มูลค่าปัจจุบัน' : 'Cost Basis (FIFO) · มูลค่าตามต้นทุน';

  const valStr = fmt(displayValue, 2);
  const [intPart, decPart] = valStr.split('.');
  document.getElementById('heroValue').innerHTML =
    `$${intPart}<span class="cents">.${decPart || '00'}</span>`;
  document.getElementById('footCost').textContent = `$${fmt(principal)}`;

  const deltaEl = document.getElementById('heroDelta');
  // นำการปรับแสดงผลเป็น inline-flex ออกเพื่อให้ซ่อนไว้ตาม CSS เริ่มต้น (display:none)
  deltaEl.style.display = 'none';

  if (isMarket) {
    const profit = marketValue - principal;
    const profitPct = principal ? profit / principal : 0;
    document.getElementById('footProfitLabel').textContent = 'Unrealized P/L · กำไร/ขาดทุน';
    document.getElementById('footProfit').textContent = `${profit>=0?'+':''}$${fmt(profit)} (${fmtPct(profitPct)})`;
    document.getElementById('footProfit').style.color = profit >= 0 ? 'var(--hero-gain-text)' : 'var(--hero-loss-text)';
    deltaEl.className = 'hero-delta ' + (profit >= 0 ? 'up' : 'down');
    deltaEl.textContent = `${profit>=0?'▲':'▼'} ${fmtPct(profitPct)}`;
  } else {
    const diff = costValue - principal;
    const diffPct = principal ? diff / principal : 0;
    document.getElementById('footProfitLabel').textContent = 'Vs. Cost Basis · ส่วนต่างจากเงินต้น';
    document.getElementById('footProfit').textContent = `${diff>=0?'+':''}$${fmt(diff)} (${fmtPct(diffPct)})`;
    document.getElementById('footProfit').style.color = diff >= 0 ? 'var(--hero-gain-text)' : 'var(--hero-loss-text)';
    deltaEl.className = 'hero-delta ' + (diff >= 0 ? 'up' : 'down');
    deltaEl.textContent = `${diff>=0?'▲':'▼'} ${fmtPct(diffPct)}`;
  }

  const historyData = state.history.filter(h => h['Date'] && h['Daily Change'] != null);
  const heroDailyEl = document.getElementById('heroDaily');
  if (historyData.length > 0) {
    const latest = historyData[historyData.length - 1];
    const prev = historyData.length > 1 ? historyData[historyData.length - 2] : null;
    const dailyChange = Number(latest['Daily Change']) || 0;
    const dailyPct = Number(latest['Daily %']) || 0;
    const dailyUp = dailyChange >= 0;

    let label = 'วันนี้';
    if (prev && prev['Date']) {
      const gapDays = Math.round((new Date(latest['Date']) - new Date(prev['Date'])) / 86400000);
      if (gapDays > 1) {
        const sinceDate = new Date(prev['Date']).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
        label = `เปลี่ยนแปลงตั้งแต่ ${sinceDate} (${gapDays} วัน)`;
      }
    }

    heroDailyEl.style.display = 'block';
    heroDailyEl.className = 'hero-daily ' + (dailyUp ? 'up' : 'down');
    heroDailyEl.innerHTML = `${label} <b>${dailyUp?'▲':'▼'} ${dailyUp?'+':''}$${fmt(dailyChange)} (${fmtPct(dailyPct)})</b>`;
  } else {
    heroDailyEl.style.display = 'none';
  }
}

function renderHeroBgChart() {
  const svg = document.getElementById('heroBgChart');
  if (!svg) return;
  const data = state.history.filter(h => h['Date'] && h['มูลค่าพอร์ต'] != null);
  if (data.length < 2) { svg.innerHTML = ''; return; }

  const W = 400, H = 200;
  const values = data.map(d => Number(d['มูลค่าพอร์ต']));
  
  // ตรวจสอบการเปลี่ยนแปลงจากวันแรกถึงวันล่าสุดเพื่อกำหนดสี
  const isUp = values[values.length - 1] >= values[values.length - 2]
  
  // ใช้ตัวแปรสีจาก CSS Variable หรือกำหนดค่าสีที่ต้องการ
  // ตรวจสอบ Theme เพื่อให้สีสวยงามเข้ากับระบบ
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
    (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  
  // กำหนดสีตามเงื่อนไข
  const lineColor = isUp ? (isDark ? '#3DBE7C' : '#1B7A4D') : (isDark ? '#E8645A' : '#B23B2E');
  const gradRGB = isUp ? (isDark ? '61,190,124' : '27,122,77') : (isDark ? '232,100,90' : '178,59,46');
  const gradStart = `rgba(${gradRGB},0.60)`;
  const gradMid = `rgba(${gradRGB},0.30)`;

  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || 1;
  const xStep = W / (data.length - 1);
  const points = values.map((v, i) => [i * xStep, (1 - (v - min) / range) * H]);

  const pathD = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const areaD = pathD + ` L${points[points.length-1][0].toFixed(1)},${H} L${points[0][0].toFixed(1)},${H} Z`;

  svg.innerHTML = `
    <defs>
      <linearGradient id="heroBgGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${gradStart}" stop-opacity="1"/>
        <stop offset="45%" stop-color="${gradMid}" stop-opacity="1"/>
        <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#heroBgGrad)" stroke="none"/>
    <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="3"/>
  `;
}


const CHART_COLORS = ['#D9A655','#378ADD','#7F77DD','#5DCAA5','#D85A30','#ED93B1','#888780','#3DBE7C','#F5A623','#9B59B6'];

let _donutInstance = null;
let _plInstance = null;

function renderBarChart() {
  // ตรวจสอบความพร้อมของ Chart.js ก่อนเรียกใช้งาน เพื่อป้องกัน Error บล็อกส่วนอื่นกรณีเน็ตช้ามากๆ
  if (typeof Chart === 'undefined') {
    setTimeout(renderBarChart, 200);
    return;
  }

}

function renderDonutChart() {
  const card = document.getElementById('donutChartCard');
  if (!card) return;
  const rows = getFilteredSummaryRows();
  if (!rows.length) {
    card.innerHTML = `<div class="empty-state" style="padding:24px;"><div class="msg">ยังไม่มีหุ้นให้แสดงสัดส่วน</div></div>`;
    return;
  }
  const basis = state.basis;

  const sorted = [...rows].sort((a,b) => (Number(b['มูลค่าปัจจุบัน'])||0) - (Number(a['มูลค่าปัจจุบัน'])||0));
  const total  = sorted.reduce((s,r) => s + (Number(r['มูลค่าปัจจุบัน'])||0), 0) || 1;
  const tickers = sorted.map(r => r['หุ้น']);
  const pcts    = sorted.map(r => parseFloat((Number(r['มูลค่าปัจจุบัน']) / total * 100).toFixed(1)));
  const plPcts  = sorted.map(r => (basis === 'AVG' ? Number(r['กำไร% AVG']) : Number(r['กำไร% FIFO'])) * 100);

  // ใช้สีของ light theme เสมอ ไม่สลับตาม dark/light เพื่อให้สีสัดส่วนคงที่ทั้งสองธีม
  const gainColor = '#1B7A4D';
  const lossColor = '#B23B2E';
  const colors  = plPcts.map(p => p >= 0 ? gainColor : lossColor);

  card.innerHTML = `<div style="position:relative;height:280px;">
    <canvas id="donutCanvas" role="img"
      aria-label="Pie chart showing portfolio allocation: ${tickers.map((t,i)=>`${t} ${pcts[i]}%`).join(', ')}"></canvas>
  </div>`;

  if (_donutInstance) { _donutInstance.destroy(); _donutInstance = null; }
  const ctx = document.getElementById('donutCanvas');
  if (!ctx) return;

  _donutInstance = new Chart(ctx.getContext('2d'), {
    type: 'pie',
    data: {
      labels: tickers,
      datasets: [{
        data: pcts,
        backgroundColor: colors,
        borderColor: '#fff',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
        datalabels: { display: false }
      },
      layout: { padding: 10 }
    },
    plugins: [{
      id: 'sliceLabels',
      afterDraw(chart) {
        const { ctx, chartArea: { width, height } } = chart;
        const meta = chart.getDatasetMeta(0);
        meta.data.forEach((arc, i) => {
          const pct = pcts[i];
          if (pct < 4) return;
          const angle = (arc.startAngle + arc.endAngle) / 2;
          const r = arc.outerRadius * 0.68;
          const x = arc.x + Math.cos(angle) * r;
          const y = arc.y + Math.sin(angle) * r;
          ctx.save();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 11px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'rgba(0,0,0,0.3)';
          ctx.shadowBlur = 3;
          ctx.fillText(`${tickers[i]}`, x, y - 6);
          ctx.font = '10px -apple-system, sans-serif';
          ctx.fillText(`(${pct}%)`, x, y + 8);
          ctx.restore();
        });
      }
    }]
  });
}

function renderPLChart() {
  const card = document.getElementById('barChartCard');
  if (!card) return;
  const rows = getFilteredSummaryRows();
  if (!rows.length) {
    card.innerHTML = `<div class="empty-state" style="padding:24px;"><div class="msg">ยังไม่มีข้อมูลกำไร/ขาดทุน</div></div>`;
    return;
  }
  const basis = state.basis;

  const withData = rows.map(r => ({
    ticker: r['หุ้น'],
    value:  Number(r['มูลค่าปัจจุบัน']) || 0,
    plPct:  parseFloat(((basis === 'AVG' ? Number(r['กำไร% AVG']) : Number(r['กำไร% FIFO'])) * 100).toFixed(2))
  })).sort((a,b) => b.value - a.value)

  const tickers   = withData.map(r => r.ticker);
  const values    = withData.map(r => r.value);
  const plPcts    = withData.map(r => r.plPct);

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
    (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const tickColor = isDark ? '#ECE9E2' : '#0E1116';
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  const axisColor = isDark ? '#8B92A0' : '#6B7280';
  const gainColor = isDark ? '#3DBE7C' : '#1B7A4D';
  const lossColor = isDark ? '#E8645A' : '#B23B2E';
  const gainSoft = isDark ? '#145e34' : '#E6F4EC';
  const lossSoft = isDark ? '#a82713' : '#FBEAE7';


  card.innerHTML = `<div style="position:relative;height:230px;">
    <canvas id="plCanvas" role="img"
      aria-label="Bar chart of current market value per stock with P&L% label: ${tickers.map((t,i)=>`${t} $${values[i].toLocaleString()} ${plPcts[i]>=0?'+':''}${plPcts[i]}%`).join(', ')}"></canvas>
  </div>`;

  if (_plInstance) { _plInstance.destroy(); _plInstance = null; }
  const ctx = document.getElementById('plCanvas');
  if (!ctx) return;

  _plInstance = new Chart(ctx.getContext('2d'), {
    type: 'bar',
    data: {
      labels: tickers,
      datasets: [{
        data: values,
        backgroundColor: plPcts.map(p => p >= 0 ? gainSoft : lossSoft),
        borderRadius: 4,
        borderSkipped: false,
        barThickness: 20
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` $${fmt(ctx.raw)} · ${plPcts[ctx.dataIndex] >= 0 ? '+' : ''}${plPcts[ctx.dataIndex]}%`
          }
        }
      },
      layout: { padding: { top: 25, bottom: 25 } },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { color: tickColor, font: { size: 11, weight: 'bold', family: 'monospace' } }
        },
        y: {
          grid: { color: gridColor },
          border: { display: false },
          ticks: {
            color: axisColor,
            font: { size: 10 },
            callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v)
          }
        }
      }
    },
    plugins: [{
      id: 'plCostCap',
      afterDatasetDraw(chart) {
        const { ctx: c } = chart;
        chart.getDatasetMeta(0).data.forEach((bar, i) => {
          const pct = plPcts[i];
          const barTop = bar.y;
          const barBottom = bar.base;
          const barLeft = bar.x - bar.width / 2;
          const barHeight = barBottom - barTop;
          const capHeight = Math.min(barHeight * 0.4, Math.max(6, Math.abs(pct) * 1.4));
          const radius = 4;
          c.save();
          c.fillStyle = pct >= 0 ? gainColor : lossColor;
          c.beginPath();
          if (pct >= 0) {
            c.roundRect(barLeft, barTop, bar.width, capHeight, [radius, radius, 0, 0]);
          } else {
            c.roundRect(barLeft, barBottom - capHeight, bar.width, capHeight, [0, 0, radius, radius]);
          }
          c.fill();
          c.restore();
        });
      }
    }, {
      id: 'plValueLabels',
      afterDatasetDraw(chart) {
        const { ctx: c } = chart;
        chart.getDatasetMeta(0).data.forEach((bar, i) => {
          const pct = plPcts[i];
          const label = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
          
          c.save();
          c.font = 'bold 11px -apple-system, monospace, sans-serif';
          c.textAlign = 'center';

          if (pct >= 0) {
            c.save();
            c.translate(bar.x, bar.y + 24);
            c.rotate(Math.PI / 2);
            c.textAlign = "center";
            c.textBaseline = "middle";
            c.fillStyle = "#ffffff";
            c.fillText(label, 0, 0);
            c.restore();
          } else {
            c.save();
            c.translate(bar.x, bar.base - 22);
            c.rotate(-Math.PI / 2);
            c.textAlign = "center";
            c.textBaseline = "middle";
            c.fillStyle = "#ffffff";
            c.fillText(label, 0, 0);
            c.restore();
          }
        });
      }
    }]
  });
}

function updateAllocTargetSumBar() {
  const bar = document.getElementById('allocTargetSumBar');
  if (!bar) return;
  const targets = Object.values(state.allocTargets);
  if (!targets.length) {
    bar.innerHTML = '';
    return;
  }
  const sum = targets.reduce((s, v) => s + (Number(v) || 0), 0);
  const diff = sum - 100;
  let statusHtml;
  let normalizeBtnHtml = '';
  if (Math.abs(diff) < 0.05) {
    statusHtml = `<span class="alloc-sum-status ontarget">✓ ครบ 100% พอดี</span>`;
  } else if (diff > 0) {
    statusHtml = `<span class="alloc-sum-status over">เกิน 100% ไป ${fmt(diff,1)}%</span>`;
    normalizeBtnHtml = `<button class="alloc-normalize-btn" id="normalizeTargetsBtn"><i class="ti ti-adjustments-horizontal"></i> ปรับให้รวม 100%</button>`;
  } else {
    statusHtml = `<span class="alloc-sum-status under">ขาดอีก ${fmt(Math.abs(diff),1)}% ถึง 100%</span>`;
  }
  bar.innerHTML = `
    <div class="alloc-sum-bar">
      <span class="alloc-sum-label">เป้าหมายรวมทั้งหมด: <b>${fmt(sum,1)}%</b></span>
      <div style="display:flex;align-items:center;gap:8px;">
        ${statusHtml}
        ${normalizeBtnHtml}
      </div>
    </div>`;

  const normalizeBtn = document.getElementById('normalizeTargetsBtn');
  if (normalizeBtn) {
    normalizeBtn.onclick = () => {
      const allTickers = Object.keys(state.allocTargets);
      const lockedTickers = allTickers.filter(t => state.allocLocked[t]);
      const unlockedTickers = allTickers.filter(t => !state.allocLocked[t]);
      const lockedSum = lockedTickers.reduce((s, t) => s + (Number(state.allocTargets[t]) || 0), 0);
      const unlockedSum = unlockedTickers.reduce((s, t) => s + (Number(state.allocTargets[t]) || 0), 0);
      const remaining = 100 - lockedSum;

      if (!unlockedTickers.length) {
        alert('ทุกตัวถูกล็อกไว้หมดแล้ว ไม่มีตัวให้ปรับ');
        return;
      }
      if (remaining <= 0) {
        alert(`หุ้นที่ล็อกไว้รวมกันแล้ว ${fmt(lockedSum,1)}% เกิน 100% ไปแล้ว กรุณาปลดล็อกบางตัวก่อน`);
        return;
      }

      const lockMsg = lockedTickers.length
        ? `(คงค่า ${lockedTickers.join(', ')} ที่ล็อกไว้ไม่เปลี่ยน รวม ${fmt(lockedSum,1)}% แล้วปรับตัวที่เหลือให้รวมเป็น ${fmt(remaining,1)}%)`
        : '(ลดทุกตัวตามสัดส่วนเดิม)';
      const ok = confirm(`ปรับเป้าหมายให้รวมกันเป็น 100% พอดี ${lockMsg} ใช่ไหม?`);
      if (!ok) return;

      const scale = remaining / unlockedSum;
      unlockedTickers.forEach(ticker => {
        state.allocTargets[ticker] = Math.round(state.allocTargets[ticker] * scale * 100) / 100;
      });
      saveAllocTargets();
      saveAllocTargetsToServer();
      renderAllocList();
    };
  }
}

          <div class="alloc-mid">
            <div class="alloc-ticker-row">
              <div class="alloc-ticker">${ticker}</div>
              <div class="alloc-current-price">$${fmt(currentPrice)}</div>
            </div>
            <div class="alloc-cost-row">ต้นทุนเฉลี่ย $${fmt(avgCostPerShare)}/หุ้น</div>
          </div>
          <div class="alloc-right">
            <div class="alloc-value">$${fmt(value)}</div>
            <div class="alloc-gain ${up?'up':'down'}">${up?'+':''}$${fmt(profit)} (${fmtPct(profitPct)})</div>
            <div class="alloc-cost-total">ทุนรวม $${fmt(totalCostBasis)}</div>
          </div>
        </div>

        <div class="alloc-target-block">
          <div class="alloc-target-summary" style="display:${hasTarget ? 'block' : 'none'};">
            ${hasTarget ? renderTargetRoomBarHtml(pct, targetVal, ticker) : ''}
          </div>

          <div class="alloc-no-target" style="display:${hasTarget ? 'none' : 'block'};">
            <div class="alloc-bar-track">
              <div class="alloc-bar-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div>
            </div>
            <div class="alloc-pct-row">
              <span class="alloc-pct">${pct.toFixed(1)}% ของพอร์ต</span>
              <button class="alloc-target-add-btn" data-ticker="${ticker}">+ ตั้งเป้าหมาย</button>
            </div>
          </div>

          <div class="alloc-target-input-row" id="targetInputRow-${ticker}" style="display:none;">
            <span class="dca-calc-label">เป้าหมายสัดส่วน</span>
            <input type="number" class="alloc-target-input" data-ticker="${ticker}" placeholder="เช่น 20" inputmode="decimal" min="0" max="100" value="${hasTarget ? targetVal : ''}">
            <span class="dca-calc-suffix">%</span>
            <button class="alloc-target-save-btn" data-ticker="${ticker}">✓</button>
          </div>
        </div>
        <div class="dca-calc">
          <div class="dca-calc-input-row">
            <span class="dca-calc-label">DCA ลงเพิ่ม $</span>
            <input type="number" class="dca-calc-input" data-ticker="${ticker}" placeholder="0" inputmode="decimal" value="${inputVal}">
          </div>
          <div class="dca-calc-result" id="dcaResult-${ticker}">${renderDcaResultHtml(r, inputVal, total)}</div>
        </div>
      </div>`;
  }).join('');

  updateAllocTargetSumBar();

  el.querySelectorAll('.dca-calc-input').forEach(input => {
    input.addEventListener('input', (e) => {
      const ticker = e.target.dataset.ticker;
      const val = e.target.value;
      state.dcaInputs[ticker] = val;
      const row = sorted.find(r => r['หุ้น'] === ticker);
      const resultEl = document.getElementById(`dcaResult-${ticker}`);
      if (resultEl && row) resultEl.innerHTML = renderDcaResultHtml(row, val, total);
    });
  });

  el.querySelectorAll('.alloc-target-add-btn, .alloc-target-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ticker = btn.dataset.ticker;
      const inputRow = document.getElementById(`targetInputRow-${ticker}`);
      if (inputRow) {
        inputRow.style.display = 'flex';
        const input = inputRow.querySelector('.alloc-target-input');
        if (input) { input.focus(); input.select(); }
      }
    });
  });

  el.querySelectorAll('.alloc-target-lock-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ticker = btn.dataset.ticker;
      state.allocLocked[ticker] = !state.allocLocked[ticker];
      saveAllocLocked();
      saveAllocTargetsToServer();
      renderAllocList();
    });
  });

  el.querySelectorAll('.alloc-target-input').forEach(input => {
    input.addEventListener('input', (e) => {
      const ticker = e.target.dataset.ticker;
      const val = e.target.value;
      if (val === '') {
        delete state.allocTargets[ticker];
      } else {
        state.allocTargets[ticker] = Math.max(0, Math.min(100, Number(val)));
      }
      saveAllocTargets();
      updateAllocTargetSumBar();
    });
  });
  el.querySelectorAll('.alloc-target-input').forEach(input => {
    input.addEventListener('blur', () => {
      renderAllocList();
      saveAllocTargetsToServer();
    });
  });
  el.querySelectorAll('.alloc-target-save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      renderAllocList();
      saveAllocTargetsToServer();
    });
  });
}

let allocTargetsSaveTimer = null;
function saveAllocTargetsToServer() {
  clearTimeout(allocTargetsSaveTimer);
  allocTargetsSaveTimer = setTimeout(async () => {
    try {
      await apiPost({ endpoint: 'saveAllocTargets', targets: state.allocTargets, locked: state.allocLocked });
    } catch (err) {
      console.error('saveAllocTargetsToServer failed:', err);
    }
  }, 400);
}

function getRoomColor(ratio) {
  const clamped = Math.min(Math.max(ratio, 0), 1);
  const hue = 140 * (1 - clamped);
  return `hsl(${hue}, 65%, 45%)`;
}

function renderTargetRoomBarHtml(actualPct, targetPct, ticker) {
  const ratio = targetPct > 0 ? actualPct / targetPct : 0;
  const barWidth = Math.min(ratio, 1) * 100;
  const overTarget = ratio > 1;
  const color = overTarget ? '#D9483B' : getRoomColor(ratio);
  const isLocked = !!state.allocLocked[ticker];

  return `
    <div class="alloc-target-summary-text">
      ปัจจุบัน <b>${fmt(actualPct,1)}%</b>&nbsp;·&nbsp;เป้าหมาย <b>${fmt(targetPct,1)}%</b>${isLocked ? ' <span class="alloc-locked-tag"><i class="ti ti-lock"></i></span>' : ''}
    </div>
    <div class="alloc-room-bar-track">
      <div class="alloc-room-bar-fill" style="width:${barWidth.toFixed(1)}%;background:${color}"></div>
    </div>
    <div class="alloc-target-footer-row">
      ${overTarget ? `<span class="alloc-target-over-label">⚠ เกินเป้าหมายแล้ว</span>` : `<span class="alloc-target-room-label">เหลือที่ลงทุนได้อีก ${fmt(Math.max(0,targetPct-actualPct),2)}%</span>`}
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="alloc-target-lock-btn ${isLocked ? 'locked' : ''}" data-ticker="${ticker}" title="${isLocked ? 'ล็อกอยู่ — จะไม่ถูกปรับตอนกด \u0022ปรับให้รวม 100%\u0022' : 'กดเพื่อล็อกเป้าหมายนี้ไว้'}"><i class="ti ti-${isLocked ? 'lock' : 'lock-open'}"></i></button>
        <button class="alloc-target-edit-btn" data-ticker="${ticker}">✏️ แก้ไข</button>
      </div>
    </div>
  `;
}

function renderTargetCompareHtml(actualPct, targetPct) {
  if (targetPct === undefined || targetPct === null) return '';
  const diff = actualPct - targetPct;
  if (Math.abs(diff) < 0.5) {
    return `<span class="alloc-target-compare ontarget">✓ ตรงเป้า (${fmt(targetPct,0)}%)</span>`;
  }
  if (diff > 0) {
    return `<span class="alloc-target-compare over">เกินเป้า +${fmt(diff,1)}%</span>`;
  }
  return `<span class="alloc-target-compare under">ต่ำกว่าเป้า ${fmt(diff,1)}%</span>`;
}

function renderDcaResultHtml(row, amountStr, totalPortfolioValue) {
  const currentPrice = Number(row['price']) || 0;
  const currentShares = Number(row['จำนวนหุ้น']) || 0;
  const currentAvgCost = Number(row['ราคา FIFO']) || 0;
  const currentValue = Number(row['มูลค่าปัจจุบัน']) || 0;
  const ticker = row['หุ้น'];
  const targetVal = state.allocTargets[ticker];
  const currentLine = `<div class="dca-current">ราคาที่ได้ปัจจุบัน: <b>$${fmt(currentAvgCost)}</b></div>`;

  const amount = Number(amountStr);
  if (!amountStr || isNaN(amount) || amount <= 0) {
    return `${currentLine}<span class="dca-calc-hint">พิมพ์จำนวนเงินเพื่อดูค่าเฉลี่ยต้นทุนและสัดส่วนใหม่</span>`;
  }
  if (currentPrice <= 0) {
    return `${currentLine}<span class="dca-calc-hint">ไม่มีราคาปัจจุบันสำหรับคำนวณ</span>`;
  }

  const newShares = amount / currentPrice;
  const newAvgCost = (currentShares * currentAvgCost + amount) / (currentShares + newShares);
  const diff = currentAvgCost - newAvgCost;
  const diffPct = currentAvgCost ? diff / currentAvgCost : 0;
  const isDrop = diff > 0;

  let allocLine = '';
  if (totalPortfolioValue) {
    const currentPct = (currentValue / totalPortfolioValue) * 100;
    const newValue = currentValue + amount;
    const newTotal = totalPortfolioValue + amount;
    const newPct = (newValue / newTotal) * 100;
    allocLine = `
      <div class="dca-alloc-projection">
        สัดส่วนใหม่: <b>${fmt(newPct,2)}%</b> (จาก ${fmt(currentPct,2)}%)
        ${targetVal !== undefined ? renderTargetCompareHtml(newPct, targetVal) : ''}
      </div>`;
  }

  return `
    ${currentLine}
    ต้นทุนเฉลี่ยใหม่: <b>$${fmt(newAvgCost)}</b>
    <span class="dca-calc-drop ${isDrop?'down':'up'}">
      ${isDrop ? '↓ ลดลง' : '↑ เพิ่มขึ้น'} $${fmt(Math.abs(diff))} (${fmtPct(Math.abs(diffPct))})
    </span>
    ${allocLine}
  `;
}

function renderTransactions() {
  const el = document.getElementById('txnList');
  const txns = state.transactions.filter(t => t['รายการ'] && t['รายการ'] !== 'USD').slice(0, 40);
  if (!txns.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon"><i class="ti ti-clipboard-list"></i></div><div class="msg">ยังไม่มีรายการ</div></div>`;
    return;
  }

  const getTxnDateRaw = (t) => t['_date'] || t['Date'] || null;
  const groups = [];
  let currentKey = null;
  txns.forEach(t => {
    const raw = getTxnDateRaw(t);
    const d = raw ? new Date(raw) : null;
    const validDate = d && !isNaN(d.getTime()) ? d : null;
    const key = validDate ? validDate.toDateString() : 'ไม่ระบุวันที่';
    if (key !== currentKey) {
      groups.push({ key, date: validDate, items: [] });
      currentKey = key;
    }
    groups[groups.length - 1].items.push(t);
  });

  el.innerHTML = groups.map(g => {
    const dateLabel = g.date
      ? g.date.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
      : 'ไม่ระบุวันที่';
    const rowsHtml = g.items.map(t => {
      const isBuy = t['action'] === 'ซื้อ';
      const rawDate = getTxnDateRaw(t);
      const parsedDate = rawDate ? new Date(rawDate) : null;
      const shortDate = (parsedDate && !isNaN(parsedDate.getTime()))
        ? parsedDate.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })
        : 'ไม่ระบุวันที่';
      return `
        <div class="txn-row">
          <div class="txn-badge ${isBuy?'buy':'sell'}">${isBuy?'B':'S'}</div>
          <div class="txn-mid">
            <div class="txn-stock">${t['รายการ']}</div>
            <div class="txn-date">${shortDate} · ${t['Port']}</div>
          </div>
          <div class="txn-right">
            <div class="txn-amount">$${fmt(t['รวม $'])}</div>
            <div class="txn-shares">@ $${fmt(t['ราคา'])}</div>
          </div>
          <button class="txn-delete" data-row="${t['_row']}" data-stock="${t['รายการ']}" title="ลบรายการนี้"><i class="ti ti-trash"></i></button>
        </div>`;
    }).join('');
    return `
      <div class="txn-date-group">
        <div class="txn-date-header">${dateLabel}</div>
        ${rowsHtml}
      </div>`;
  }).join('');

  el.querySelectorAll('.txn-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      const row = btn.dataset.row;
      const stock = btn.dataset.stock;
      const confirmed = confirm(`ลบรายการ ${stock} นี้ออกจาก Sheet เลยไหม? การลบนี้ย้อนกลับไม่ได้`);
      if (!confirmed) return;

      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader-2"></i>';
      try {
        const result = await apiPost({ endpoint: 'deleteTransaction', row: row, stock: stock });
        if (result.success) {
          loadAll();
        } else {
          alert(result.error || 'ลบไม่สำเร็จ');
          btn.disabled = false;
          btn.innerHTML = '<i class="ti ti-trash"></i>';
        }
      } catch (err) {
        alert('เชื่อมต่อไม่สำเร็จ: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-trash"></i>';
      }
    });
  });
}

function populatePortSelect() {
  const sel = document.getElementById('fPort');
  sel.innerHTML = state.ports.map(p => `<option value="${p}">${p}</option>`).join('');
}

document.getElementById('basisToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.basis-btn-inline');
  if (!btn) return;
  document.querySelectorAll('.basis-btn-inline').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.basis = btn.dataset.basis;
  renderAllocList();
});

document.getElementById('valueModeToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.basis-btn');
  if (!btn) return;
  document.querySelectorAll('#valueModeToggle .basis-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.valueMode = btn.dataset.mode;
  renderHero();
});

const sheet = document.getElementById('addSheet');
const backdrop = document.getElementById('sheetBackdrop');

function openSheet() {
  document.getElementById('fDate').valueAsDate = new Date();
  sheet.classList.add('open');
  backdrop.classList.add('open');
}
function closeSheet() {
  sheet.classList.remove('open');
  backdrop.classList.remove('open');
  document.getElementById('formMsg').textContent = '';
  document.getElementById('formMsg').className = 'form-msg';
}
document.getElementById('fabAdd').onclick = openSheet;
document.getElementById('sheetClose').onclick = closeSheet;
backdrop.onclick = closeSheet;

let selectedAction = 'ซื้อ';
document.querySelector('.action-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.action-btn');
  if (!btn) return;
  document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedAction = btn.dataset.action;
});

document.getElementById('submitBtn').onclick = async () => {
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('formMsg');
  const port = document.getElementById('fPort').value;
  const stock = document.getElementById('fStock').value.trim().toUpperCase();
  const amount = document.getElementById('fAmount').value;
  const shares = document.getElementById('fShares').value;
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();

  if (!port || !stock || !amount || !shares) {
    msg.textContent = 'กรุณากรอกข้อมูลให้ครบ';
    msg.className = 'form-msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';
  msg.textContent = '';
  msg.className = 'form-msg';

  try {
    const result = await apiPost({
      endpoint: 'addTransaction',
      port,
      txnAction: selectedAction,
      stock, totalAmount: amount, shares, date, note
    });

    if (result.success) {
      msg.textContent = '✓ บันทึกสำเร็จ';
      msg.className = 'form-msg success';
      document.getElementById('fStock').value = '';
      document.getElementById('fAmount').value = '';
      document.getElementById('fShares').value = '';
      document.getElementById('fNote').value = '';
      setTimeout(() => { closeSheet(); loadAll(); }, 700);
    } else {
      msg.textContent = result.error || 'เกิดข้อผิดพลาด';
      msg.className = 'form-msg error';
    }
  } catch (err) {
    msg.textContent = 'เชื่อมต่อไม่สำเร็จ: ' + err.message;
    msg.className = 'form-msg error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'บันทึกรายการ';
  }
};

updateThemeIcon();
renderFromSnapshot(); // แสดงข้อมูลล่าสุดที่แคชไว้ทันที ไม่ต้องรอ network ก่อน
loadAll();
</script>
