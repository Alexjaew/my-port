<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Percentage Change</title>
    <!-- โหลดไลบรารี Chart.js จากอินเทอร์เน็ต -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }
        .chart-container {
            width: 80%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <!-- พื้นที่สำหรับแสดงกราฟ -->
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // 1. ข้อมูลตั้งต้น
        let stockData = [
            { name: 'PTT', percent: -2.5 },
            { name: 'AOT', percent: 5.2 },
            { name: 'CPALL', percent: -4.1 },
            { name: 'ADVANC', percent: 1.8 },
            { name: 'DELTA', percent: 10.5 },
            { name: 'SCC', percent: -1.0 }
        ];

        // 2. การแก้ปัญหา: เรียงลำดับข้อมูลจากมากไปน้อย (ยาวไปหาน้อย)
        stockData.sort((a, b) => b.percent - a.percent);

        // แยกข้อมูลชื่อหุ้นและตัวเลขออกจากกันเพื่อเตรียมพล็อต
        const labels = stockData.map(item => item.name);
        const data = stockData.map(item => item.percent);
        
        // กำหนดสี: ถ้าค่าบวกเป็นสีเขียว ค่าลบเป็นสีแดง
        const backgroundColors = data.map(value => value > 0 ? 'rgba(44, 160, 44, 0.8)' : 'rgba(214, 39, 40, 0.8)');

        // 3. สร้างกราฟ
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Percentage Change (%)',
                    data: data,
                    backgroundColor: backgroundColors,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'กราฟแสดงการเปลี่ยนแปลงของหุ้น',
                        font: { size: 18 }
                    }
                },
                scales: {
                    x: {
                        // Chart.js จะวางชื่อหุ้นไว้ด้านล่างสุดของขอบกราฟโดยอัตโนมัติ ทำให้ไม่ทับแท่งที่ติดลบ
                        ticks: {
                            padding: 10, // เพิ่มระยะห่างให้ชื่อขยับลงมาอีก
                            font: { size: 12, weight: 'bold' }
                        },
                        grid: {
                            display: false // ซ่อนเส้นกริดแนวตั้งให้ดูสะอาดตา
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Percent (%)'
                        }
                    }
                }
            }
        });
    </script>

</body>
</html>
