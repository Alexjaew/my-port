<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dashboard & DCA Tracker</title>
    <style>
        /* --- CSS VARIABLES FOR THEME SWITCHING --- */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --primary-color: #0d6efd;
            --input-bg: #ffffff;
            --input-text: #212529; /* FIXED: Explicit light mode text color */
        }

        body.dark-mode {
            --bg-color: #1a1d20;
            --card-bg: #212529;
            --text-color: #f8f9fa;
            --border-color: #373b3e;
            --primary-color: #3d8bfd;
            --input-bg: #2d3238;
            --input-text: #ffffff; /* FIXED: Explicit dark mode text color */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-theme {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 { margin-top: 0; color: var(--primary-color); }

        /* --- CRITICAL FIX: INPUT VISIBILITY --- */
        input[type="number"], 
        input[type="text"], 
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 18px 0;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            
            /* These variables ensure text is ALWAYS visible in both modes */
            background-color: var(--input-bg) !important;
            color: var(--input-text) !important; 
            
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.25);
        }

        label { font-weight: 600; font-size: 14px; }

        /* --- TRANSACTION LOG TABLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th { background-color: rgba(0,0,0,0.02); font-weight: 600; }
        body.dark-mode th { background-color: rgba(255,255,255,0.02); }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-buy { background-color: #2e7d32; color: white; }
        .badge-sell { background-color: #c62828; color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="hero-container">
            <h1>Portfolio Engine</h1>
        </div>
        <button class="btn btn-theme" onclick="toggleTheme()">🌓 Switch Theme</button>
    </header>

    <div class="grid">
        <!-- LEFT: Allocation Settings -->
        <div class="card">
            <h2>Asset Allocation Targets</h2>
            <p>Enter your target percentages. Text visibility bug is fixed here.</p>
            <form id="alloc-form" onsubmit="event.preventDefault(); saveAllocations();">
                <label for="alloc-btc">Bitcoin (BTC) Allocation %</label>
                <input type="number" id="alloc-btc" min="0" max="100" placeholder="e.g., 50" value="50" required>

                <label for="alloc-eth">Ethereum (ETH) Allocation %</label>
                <input type="number" id="alloc-eth" min="0" max="100" placeholder="e.g., 30" value="30" required>

                <label for="alloc-cash">Cash/Stablecoins Allocation %</label>
                <input type="number" id="alloc-cash" min="0" max="100" placeholder="e.g., 20" value="20" required>

                <button type="submit" class="btn">Save Allocation Proportions</button>
            </form>
        </div>

        <!-- RIGHT: Log New Trade -->
        <div class="card">
            <h2>Record New Transaction</h2>
            <p>The system will automatically extract and attach the date.</p>
            <form id="tx-form" onsubmit="event.preventDefault(); addTransaction();">
                <label for="tx-asset">Asset</label>
                <select id="tx-asset">
                    <option value="BTC">Bitcoin (BTC)</option>
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="USDT">Pompom Stablecoin (USDT)</option>
                </select>

                <label for="tx-type">Transaction Type</label>
                <select id="tx-type">
                    <option value="BUY">BUY</option>
                    <option value="SELL">SELL</option>
                </select>

                <label for="tx-amount">Amount / Units</label>
                <input type="number" id="tx-amount" step="any" placeholder="0.00" required>

                <button type="submit" class="btn">Log Transaction</button>
            </form>
        </div>
    </div>

    <!-- BOTTOM: Full Transaction Log History -->
    <div class="card" style="margin-top: 20px;">
        <h2>Transaction History Log</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date Pulled</th>
                        <th>Asset</th>
                        <th>Type</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="transaction-list-container">
                    <!-- Dynamic Rows Will Load Here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // App State Mock Database
    let allTransactions = [
        { date: "20/06/2026", asset: "BTC", type: "BUY", amount: "0.045" },
        { date: "22/06/2026", asset: "ETH", type: "BUY", amount: "1.25" }
    ];

    // Initialization Function
    function loadAll() {
        renderTransactionList();
        console.log("Dashboard initialized successfully.");
    }

    // FIXED LOGIC: Auto-pulls the current system date on record submit
    function addTransaction() {
        const assetField = document.getElementById('tx-asset');
        const typeField = document.getElementById('tx-type');
        const amountField = document.getElementById('tx-amount');

        // Extracting local system timestamp automatically
        const pulledDate = new Date().toLocaleDateString('th-TH', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });

        const newTx = {
            date: pulledDate, 
            asset: assetField.value,
            type: typeField.value,
            amount: amountField.value
        };

        allTransactions.unshift(newTx); // Insert at the top of history
        renderTransactionList();
        
        amountField.value = ''; // Clear inputs cleanly
    }

    // Dynamic rendering of rows containing pulled date strings
    function renderTransactionList() {
        const listContainer = document.getElementById('transaction-list-container');
        listContainer.innerHTML = ''; 

        if(allTransactions.length === 0) {
            listContainer.innerHTML = `<tr><td colspan="4" style="text-align:center;">No history recorded yet.</td></tr>`;
            return;
        }

        allTransactions.forEach(tx => {
            const row = document.createElement('tr');
            const typeBadge = tx.type === 'BUY' ? 'badge badge-buy' : 'badge badge-sell';
            
            row.innerHTML = `
                <td><strong>${tx.date}</strong></td>
                <td>${tx.asset}</td>
                <td><span class="${typeBadge}">${tx.type}</span></td>
                <td>${tx.amount}</td>
            `;
            listContainer.appendChild(row);
        });
    }

    function saveAllocations() {
        alert("Proportions updated successfully inside memory!");
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    // Run startup routine
    window.onload = loadAll;
</script>

</body>
</html>
