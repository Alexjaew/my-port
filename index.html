<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Port — Portfolio Tracker</title>
<style>
  :root {
    --ink: #0E1116;
    --ink-soft: #4A5160;
    --paper: #FAF8F4;
    --paper-raised: #FFFFFF;
    --line: #E4E0D8;
    --gain: #1B7A4D;
    --gain-soft: #E6F4EC;
    --loss: #B23B2E;
    --loss-soft: #FBEAE7;
    --accent: #C98A2C;
    --accent-soft: #F6ECD9;
    --mono: 'SF Mono', 'IBM Plex Mono', ui-monospace, monospace;
    --serif: 'Source Serif Pro', 'Iowan Old Style', Georgia, serif;
    --sans: -apple-system, 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding-bottom: 90px;
    min-height: 100vh;
  }

  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: max(16px, env(safe-area-inset-top)) 20px 12px;
  }
  .topbar-row {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .brand {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand .dot { color: var(--accent); }
  .port-switch {
    display: flex; gap: 6px; margin-top: 14px;
    overflow-x: auto;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .port-switch::-webkit-scrollbar { display: none; }
  .port-chip {
    flex: 0 0 auto;
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid var(--line);
    background: var(--paper-raised);
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s ease;
  }
  .port-chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .section { padding: 22px 20px 0; }
  .section-label {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .section-label-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-label-row .section-label { margin-bottom: 0; }
  .basis-toggle-inline {
    display: flex; background: var(--line);
    border-radius: 100px; padding: 2px;
  }
  .basis-btn-inline {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.02em;
    padding: 4px 9px; border-radius: 100px; color: var(--ink-soft);
    cursor: pointer; transition: all .15s ease;
  }
  .basis-btn-inline.active { background: var(--paper-raised); color: var(--ink); }

  .hero-card {
    background: var(--ink);
    color: var(--paper);
    border-radius: 20px;
    padding: 24px 22px 20px;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute; right: -40px; top: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,138,44,0.25), transparent 70%);
  }
  .hero-label {
    font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    color: rgba(250,248,244,0.55); margin-bottom: 6px;
  }
  .hero-value {
    font-family: var(--mono);
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .hero-value .cents { font-size: 22px; opacity: 0.6; }
  .hero-delta {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 14px; font-weight: 600;
    padding: 4px 10px 4px 8px;
    border-radius: 100px;
  }
  .hero-delta.up { background: rgba(27,122,77,0.25); color: #7CDDA8; }
  .hero-delta.down { background: rgba(178,59,46,0.25); color: #F1A89E; }
  .hero-daily {
    font-family: var(--mono);
    font-size: 12px; margin-top: 8px;
    color: rgba(250,248,244,0.65);
  }
  .hero-daily b { font-weight: 600; }
  .hero-daily.up b { color: #7CDDA8; }
  .hero-daily.down b { color: #F1A89E; }

  .basis-toggle {
    display: flex; background: rgba(250,248,244,0.12);
    border-radius: 100px; padding: 3px;
    margin-bottom: 14px;
    width: fit-content;
  }
  .basis-btn {
    font-size: 11px; font-weight: 700; letter-spacing: 0.01em;
    padding: 6px 11px; border-radius: 100px; color: rgba(250,248,244,0.6);
    cursor: pointer; transition: all .15s ease;
    white-space: nowrap;
  }
  .basis-btn.active { background: var(--paper); color: var(--ink); }

  .hero-foot {
    display: flex; gap: 14px; margin-top: 18px;
    padding-top: 16px; border-top: 1px solid rgba(250,248,244,0.12);
  }
  .hero-foot-item { flex: 1; min-width: 0; }
  .hero-foot-label { font-size: 10.5px; color: rgba(250,248,244,0.5); margin-bottom: 3px; white-space: nowrap; }
  .hero-foot-value { font-family: var(--mono); font-size: 14px; font-weight: 600; white-space: nowrap; }

  .alloc-row-wrap {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .alloc-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px;
  }
  .alloc-icon {
    width: 38px; height: 38px; border-radius: 50%;
    color: #fff; font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
  }
  .alloc-mid { flex: 1; min-width: 0; }
  .alloc-ticker { font-weight: 700; font-size: 14.5px; font-family: var(--mono); }
  .alloc-bar-track { height: 4px; background: var(--line); border-radius: 4px; margin-top: 6px; overflow: hidden; }
  .alloc-bar-fill { height: 100%; border-radius: 4px; }
  .alloc-pct { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; font-family: var(--mono); }
  .alloc-right { text-align: right; flex: 0 0 auto; }
  .alloc-value { font-family: var(--mono); font-size: 14px; font-weight: 600; }
  .alloc-gain { font-family: var(--mono); font-size: 12px; font-weight: 600; margin-top: 2px; }
  .alloc-gain.up { color: var(--gain); }
  .alloc-gain.down { color: var(--loss); }

  .dca-calc {
    border-top: 1px solid var(--line);
    background: var(--accent-soft);
    padding: 10px 14px;
  }
  .dca-calc-input-row {
    display: flex; align-items: center; gap: 8px;
  }
  .dca-calc-label {
    font-size: 12px; font-weight: 600; color: #7A5414; white-space: nowrap;
  }
  .dca-calc-input {
    flex: 1; min-width: 0;
    padding: 7px 10px;
    border-radius: 8px; border: 1px solid #E5C98A;
    font-size: 14px; font-family: var(--mono);
    background: var(--paper-raised); color: var(--ink);
  }
  .dca-calc-input:focus { outline: none; border-color: var(--accent); }
  .dca-calc-result {
    font-size: 12px; margin-top: 7px; color: var(--ink-soft); font-family: var(--mono);
  }
  .dca-calc-result b { color: var(--ink); font-weight: 700; }
  .dca-calc-drop { font-weight: 600; margin-left: 6px; }
  .dca-calc-drop.down { color: var(--gain); }
  .dca-calc-drop.up { color: var(--loss); }
  .dca-calc-hint { color: var(--ink-soft); }
  .dca-current {
    font-size: 12px; color: var(--ink-soft); margin-bottom: 4px;
  }
  .dca-current b { color: var(--ink); font-weight: 700; }

  .txn-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .txn-row:last-child { border-bottom: none; }
  .txn-badge {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex: 0 0 auto;
  }
  .txn-badge.buy { background: var(--gain-soft); color: var(--gain); }
  .txn-badge.sell { background: var(--loss-soft); color: var(--loss); }
  .txn-mid { flex: 1; min-width: 0; }
  .txn-stock { font-weight: 700; font-size: 14.5px; }
  .txn-date { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }
  .txn-right { text-align: right; }
  .txn-amount { font-family: var(--mono); font-weight: 600; font-size: 14px; }
  .txn-shares { font-size: 11.5px; color: var(--ink-soft); font-family: var(--mono); }
  .txn-delete {
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 8px; border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 15px;
    cursor: pointer;
    margin-left: 2px;
  }
  .txn-delete:active { background: var(--loss-soft); }
  .txn-delete:disabled { opacity: 0.4; }

  .chart-card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 14px 14px;
  }
  .chart-meta {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px; padding: 0 4px;
  }
  .chart-meta-value {
    font-family: var(--mono); font-size: 17px; font-weight: 700;
  }
  .chart-meta-delta {
    font-family: var(--mono); font-size: 12.5px; font-weight: 600;
    padding: 2px 8px; border-radius: 100px;
  }
  .chart-meta-delta.up { background: var(--gain-soft); color: var(--gain); }
  .chart-meta-delta.down { background: var(--loss-soft); color: var(--loss); }
  .line-svg-wrap { position: relative; width: 100%; }
  .line-svg-wrap svg { display: block; width: 100%; height: auto; }
  .chart-axis-labels {
    display: flex; justify-content: space-between;
    font-size: 10.5px; color: var(--ink-soft); margin-top: 4px; padding: 0 2px;
  }

  .pie-wrap { display: flex; align-items: center; gap: 18px; }
  .pie-wrap svg { flex: 0 0 auto; }
  .legend { flex: 1; display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .legend-swatch { width: 9px; height: 9px; border-radius: 3px; flex: 0 0 auto; }
  .legend-ticker { font-weight: 700; font-family: var(--mono); width: 42px; flex: 0 0 auto; }
  .legend-pct { color: var(--ink-soft); font-family: var(--mono); margin-left: auto; }

  .bar-chart-wrap {
    display: flex; align-items: flex-end; gap: 8px;
    height: 180px; padding: 0 2px 0;
    overflow-x: auto;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .bar-chart-wrap::-webkit-scrollbar { display: none; }
  .bar-col {
    display: flex; flex-direction: column; align-items: center;
    flex: 0 0 auto; width: 40px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar-pct-label {
    font-family: var(--mono); font-size: 10.5px; font-weight: 700;
    color: var(--ink-soft); margin-bottom: 4px; white-space: nowrap;
  }
  .bar-fill {
    width: 22px;
    border-radius: 6px 6px 3px 3px;
    min-height: 3px;
  }
  .bar-ticker-label {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    margin-top: 8px; color: var(--ink);
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
  .empty-state .msg { font-size: 13.5px; }

  .skel {
    background: linear-gradient(90deg, var(--line) 25%, #ECE8DE 37%, var(--line) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 10px;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

  .fab {
    position: fixed;
    bottom: max(24px, env(safe-area-inset-bottom));
    right: 20px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    border: none;
    box-shadow: 0 8px 24px rgba(14,17,22,0.35);
    cursor: pointer;
    z-index: 30;
    transition: transform .12s ease;
  }
  .fab:active { transform: scale(0.92); }

  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(14,17,22,0.45);
    z-index: 40;
    opacity: 0; pointer-events: none;
    transition: opacity .2s ease;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--paper);
    border-radius: 24px 24px 0 0;
    z-index: 41;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.32,.72,0,1);
    max-height: 88vh;
    overflow-y: auto;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--line);
    border-radius: 4px; margin: 12px auto 6px;
  }
  .sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px 16px;
  }
  .sheet-title { font-family: var(--serif); font-size: 19px; font-weight: 600; }
  .sheet-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--line); border: none;
    font-size: 16px; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
  }
  .sheet-body { padding: 0 20px; }

  .action-toggle {
    display: flex; gap: 8px; margin-bottom: 18px;
  }
  .action-btn {
    flex: 1; padding: 12px; border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--paper-raised);
    font-weight: 700; font-size: 14.5px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .action-btn.buy.active { border-color: var(--gain); background: var(--gain-soft); color: var(--gain); }
  .action-btn.sell.active { border-color: var(--loss); background: var(--loss-soft); color: var(--loss); }

  .field { margin-bottom: 14px; }
  .field-label {
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
    margin-bottom: 6px; display: block;
  }
  .field input, .field select {
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--paper-raised);
    font-size: 16px;
    font-family: var(--sans);
    color: var(--ink);
    appearance: none;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--ink);
  }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .submit-btn {
    width: 100%; padding: 15px;
    border-radius: 14px; border: none;
    background: var(--ink); color: var(--paper);
    font-size: 15.5px; font-weight: 700;
    margin-top: 6px;
    cursor: pointer;
  }
  .submit-btn:disabled { opacity: 0.5; }

  .form-msg {
    font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px;
  }
  .form-msg.error { color: var(--loss); }
  .form-msg.success { color: var(--gain); }

  .setup-banner {
    margin: 16px 20px 0;
    background: var(--accent-soft);
    border: 1px solid #E5C98A;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
    color: #7A5414;
    line-height: 1.5;
  }
  .setup-banner code {
    background: rgba(0,0,0,0.06);
    padding: 1px 5px; border-radius: 5px; font-size: 12px;
  }
  .url-input-row {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .setup-banner input {
    flex: 1; min-width: 0;
    padding: 9px 10px; border-radius: 8px;
    border: 1px solid #E5C98A; font-size: 13px;
    box-sizing: border-box;
  }
  #apiUrlClear {
    flex: 0 0 auto;
    width: 36px;
    padding: 9px 0; border-radius: 8px;
    border: 1px solid #E5C98A;
    background: var(--paper-raised);
    color: #7A5414; font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  .setup-banner button#apiUrlSave {
    margin-top: 8px; padding: 8px 14px;
    background: var(--ink); color: var(--paper);
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">My Port<span class="dot">.</span></div>
      <button id="settingsBtn" style="background:none;border:none;font-size:18px;color:var(--ink-soft);cursor:pointer;padding:4px;">⚙︎</button>
    </div>
    <div class="port-switch" id="portSwitch"></div>
  </div>

  <div id="setupBanner"></div>

  <div class="section">
    <div class="section-label">มูลค่าพอร์ต</div>
    <div class="hero-card">
      <div class="basis-toggle" id="valueModeToggle">
        <div class="basis-btn active" data-mode="market">มูลค่าตามราคาตลาด</div>
        <div class="basis-btn" data-mode="cost">มูลค่าตามต้นทุน</div>
      </div>
      <div class="hero-label" id="heroLabel">มูลค่าปัจจุบัน</div>
      <div class="hero-value" id="heroValue">—</div>
      <div class="hero-delta" id="heroDelta" style="display:none"></div>
      <div class="hero-daily" id="heroDaily" style="display:none"></div>
      <div class="hero-foot">
        <div class="hero-foot-item">
          <div class="hero-foot-label">เงินต้น</div>
          <div class="hero-foot-value" id="footCost">—</div>
        </div>
        <div class="hero-foot-item">
          <div class="hero-foot-label" id="footProfitLabel">กำไร/ขาดทุน</div>
          <div class="hero-foot-value" id="footProfit">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">มูลค่าพอร์ตรายวัน</div>
    <div class="chart-card" id="valueChartCard">
      <div class="skel" style="height:160px;"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">สัดส่วนหุ้น (กราฟแท่ง)</div>
    <div class="chart-card" id="barChartCard">
      <div class="skel" style="height:220px;"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label-row">
      <div class="section-label">สัดส่วนการลงทุน</div>
      <div class="basis-toggle-inline" id="basisToggle">
        <div class="basis-btn-inline active" data-basis="AVG">AVG</div>
        <div class="basis-btn-inline" data-basis="FIFO">FIFO</div>
      </div>
    </div>
    <div id="allocList">
      <div class="skel" style="height:64px;margin-bottom:8px;"></div>
      <div class="skel" style="height:64px;margin-bottom:8px;"></div>
      <div class="skel" style="height:64px;"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">รายการล่าสุด</div>
    <div id="txnList" style="background:var(--paper-raised);border:1px solid var(--line);border-radius:14px;padding:4px 14px;">
      <div class="skel" style="height:50px;margin:10px 0;"></div>
      <div class="skel" style="height:50px;margin:10px 0;"></div>
    </div>
  </div>

  <button class="fab" id="fabAdd">+</button>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="addSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title">เพิ่มรายการ</div>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>
    <div class="sheet-body">
      <div class="action-toggle">
        <div class="action-btn buy active" data-action="ซื้อ">ซื้อ</div>
        <div class="action-btn sell" data-action="ขาย">ขาย</div>
      </div>

      <div class="field">
        <label class="field-label">พอร์ต</label>
        <select id="fPort"></select>
      </div>

      <div class="field">
        <label class="field-label">ชื่อหุ้น</label>
        <input type="text" id="fStock" placeholder="เช่น AAPL" autocapitalize="characters">
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field-label">จำนวนเงินรวม ($)</label>
          <input type="number" id="fAmount" placeholder="0.00" inputmode="decimal">
        </div>
        <div class="field">
          <label class="field-label">จำนวนหุ้น</label>
          <input type="number" id="fShares" placeholder="0.000000" inputmode="decimal">
        </div>
      </div>

      <div class="field">
        <label class="field-label">วันที่</label>
        <input type="date" id="fDate">
      </div>

      <div class="field">
        <label class="field-label">โน้ต (ไม่บังคับ)</label>
        <input type="text" id="fNote" placeholder="">
      </div>

      <button class="submit-btn" id="submitBtn">บันทึกรายการ</button>
      <div class="form-msg" id="formMsg"></div>
    </div>
  </div>

<script>
// URL ของ Apps Script ที่ deploy ไว้ — ฝังเป็นค่าเริ่มต้น ไม่ต้องกรอกใหม่ทุกครั้ง
// ถ้า deploy ใหม่แล้ว URL เปลี่ยน ให้กดปุ่ม ⚙︎ ในแอพเพื่อตั้งค่า URL ใหม่ (จะถูกจำไว้แทนตัวนี้)
const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbxqrfTAipQFjum4jBuPHVBALqpo1t_QrN9G60RV1VblmG877lWJB6Fc6VAIqjzxtAew/exec';
let API_URL = localStorage.getItem('portfolio_api_url') || DEFAULT_API_URL;

const state = {
  port: 'ALL',
  basis: 'AVG',
  valueMode: 'market',
  summary: null,
  dashboard: null,
  transactions: [],
  ports: [],
  history: [],
  dcaInputs: {} // เก็บค่าเงินที่ผู้ใช้กรอกไว้ในตัวคำนวณ DCA ต่อหุ้น เช่น { RKLB: 50 }
};

const fmt = (n, decimals=2) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
};
const fmtPct = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n * 100 >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%';
};

function showSetupBanner(errorMsg) {
  const el = document.getElementById('setupBanner');
  el.innerHTML = `
    <div class="setup-banner">
      ${errorMsg ? '⚠️ ' + errorMsg + '<br><br>' : ''}วาง <strong>Web App URL</strong> จาก Apps Script ที่ deploy ไว้ที่นี่
      (ลงท้ายด้วย <code>/exec</code>)
      <div class="url-input-row">
        <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/xxxx/exec" value="${API_URL || ''}">
        <button id="apiUrlClear" type="button" title="ลบลิงก์ที่บันทึกไว้ และกลับไปใช้ค่าเริ่มต้น">✕</button>
      </div>
      <button id="apiUrlSave">บันทึกและเชื่อมต่อ</button>
    </div>`;
  document.getElementById('apiUrlSave').onclick = () => {
    const val = document.getElementById('apiUrlInput').value.trim();
    if (val) {
      localStorage.setItem('portfolio_api_url', val);
      API_URL = val;
      el.innerHTML = '';
      loadAll();
    }
  };
  document.getElementById('apiUrlClear').onclick = () => {
    // ลบ URL ที่บันทึกไว้ใน localStorage ทั้งหมด แล้วกลับไปใช้ URL เริ่มต้นที่ฝังในไฟล์
    // กันปัญหากรณีมี URL เก่า/ผิดค้างอยู่ใน localStorage ที่บัง URL เริ่มต้นไว้
    localStorage.removeItem('portfolio_api_url');
    API_URL = DEFAULT_API_URL;
    document.getElementById('apiUrlInput').value = DEFAULT_API_URL;
  };
}

document.getElementById('settingsBtn').onclick = () => showSetupBanner();

async function api(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => { if (v !== null) url.searchParams.set(k, v); });
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function loadAll() {
  if (!API_URL) { showSetupBanner(); return; }
  try {
    const [summary, dashboard, ports, txns, history] = await Promise.all([
      api('summary'),
      api('dashboard'),
      api('ports'),
      api('transactions', { port: state.port === 'ALL' ? null : state.port }),
      api('history')
    ]);
    if (summary.error || dashboard.error || ports.error || txns.error) {
      const errMsg = summary.error || dashboard.error || ports.error || txns.error;
      throw new Error(errMsg);
    }
    state.summary = summary;
    state.dashboard = dashboard;
    state.ports = ports.ports || [];
    state.transactions = txns.rows || [];
    state.history = (history && history.rows) || [];
    renderPortSwitch();
    renderHero();
    renderValueLineChart();
    renderBarChart();
    renderAllocList();
    renderTransactions();
    populatePortSelect();
  } catch (err) {
    console.error(err);
    document.getElementById('allocList').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><div class="msg">โหลดข้อมูลไม่สำเร็จ: ${err.message}<br><br>กดปุ่ม ⚙︎ ด้านบนเพื่อตรวจสอบ/แก้ไข URL</div></div>`;
    showSetupBanner('เชื่อมต่อไม่สำเร็จ: ' + err.message + ' — ตรวจสอบว่า URL ถูกต้อง และตอน Deploy เลือก "Who has access: Anyone" แล้ว');
  }
}

function renderPortSwitch() {
  const el = document.getElementById('portSwitch');
  const ports = ['ALL', ...state.ports];
  el.innerHTML = ports.map(p =>
    `<div class="port-chip ${p === state.port ? 'active' : ''}" data-port="${p}">${p === 'ALL' ? 'ทั้งหมด' : p}</div>`
  ).join('');
  el.querySelectorAll('.port-chip').forEach(chip => {
    chip.onclick = () => {
      state.port = chip.dataset.port;
      loadAll();
    };
  });
}

function rerenderForBasisOrPort() {
  renderHero();
  renderBarChart();
  renderAllocList();
}

function getFilteredSummaryRows() {
  if (!state.summary) return [];
  const rows = state.summary.rows.filter(r => r['หุ้น'] !== 'USD');
  if (state.port === 'ALL') return rows;
  return rows.filter(r => r['ชื่อ port'] === state.port);
}

// ดึงเงินสดคงเหลือ (แถวที่หุ้น = USD) รวมทุก port ที่มี — ไม่ขึ้นกับ state.port ที่เลือกอยู่
// ใช้เป็น "เงินต้น" ในการคำนวณกำไร/ขาดทุนรวมในหน้าแรก
function getCashBalance() {
  if (!state.summary) return 0;
  return state.summary.rows
    .filter(r => r['หุ้น'] === 'USD')
    .reduce((sum, r) => sum + (Number(r['มูลค่าปัจจุบัน']) || 0), 0);
}

function renderHero() {
  const rows = getFilteredSummaryRows();
  let marketValue = 0, costValue = 0;

  rows.forEach(r => {
    marketValue += Number(r['มูลค่าปัจจุบัน']) || 0;
    costValue += Number(r['ทุน  FIFO']) || 0;
  });

  // เงินต้น = เงินสดทั้งหมดที่ฝากเข้าพอร์ตเพื่อลงทุน (ไม่ใช่ทุน AVG/FIFO ของหุ้น)
  const principal = getCashBalance();

  const isMarket = state.valueMode === 'market';
  const displayValue = isMarket ? marketValue : costValue;

  document.getElementById('heroLabel').textContent = isMarket ? 'มูลค่าปัจจุบัน' : 'มูลค่าตามต้นทุน (FIFO)';

  const valStr = fmt(displayValue, 2);
  const [intPart, decPart] = valStr.split('.');
  document.getElementById('heroValue').innerHTML =
    `$${intPart}<span class="cents">.${decPart || '00'}</span>`;
  document.getElementById('footCost').textContent = `$${fmt(principal)}`;

  const deltaEl = document.getElementById('heroDelta');
  deltaEl.style.display = 'inline-flex';

  if (isMarket) {
    // โหมดมูลค่าตามราคาตลาด: กำไร/ขาดทุน = มูลค่าปัจจุบัน เทียบกับเงินต้นที่ฝากเข้ามา
    const profit = marketValue - principal;
    const profitPct = principal ? profit / principal : 0;
    document.getElementById('footProfitLabel').textContent = 'กำไร/ขาดทุน';
    document.getElementById('footProfit').textContent = `${profit>=0?'+':''}$${fmt(profit)}`;
    document.getElementById('footProfit').style.color = profit >= 0 ? '#7CDDA8' : '#F1A89E';
    deltaEl.className = 'hero-delta ' + (profit >= 0 ? 'up' : 'down');
    deltaEl.textContent = `${profit>=0?'▲':'▼'} ${fmtPct(profitPct)}`;
  } else {
    // โหมดมูลค่าตามต้นทุน: เทียบทุน FIFO ของหุ้น กับเงินต้นที่ฝากเข้ามา (ส่วนต่างจากการ reinvest กำไร)
    const diff = costValue - principal;
    const diffPct = principal ? diff / principal : 0;
    document.getElementById('footProfitLabel').textContent = 'ส่วนต่างจากเงินต้น';
    document.getElementById('footProfit').textContent = `${diff>=0?'+':''}$${fmt(diff)}`;
    document.getElementById('footProfit').style.color = diff >= 0 ? '#7CDDA8' : '#F1A89E';
    deltaEl.className = 'hero-delta ' + (diff >= 0 ? 'up' : 'down');
    deltaEl.textContent = `${diff>=0?'▲':'▼'} ${fmtPct(diffPct)}`;
  }

  // เปลี่ยนแปลงวันนี้ — ดึงจากแถวล่าสุดใน Sheet History (คอลัมน์ Daily Change / Daily %)
  const historyData = state.history.filter(h => h['Date'] && h['Daily Change'] != null);
  const heroDailyEl = document.getElementById('heroDaily');
  if (historyData.length > 0) {
    const latest = historyData[historyData.length - 1];
    const dailyChange = Number(latest['Daily Change']) || 0;
    const dailyPct = Number(latest['Daily %']) || 0;
    const dailyUp = dailyChange >= 0;
    heroDailyEl.style.display = 'block';
    heroDailyEl.className = 'hero-daily ' + (dailyUp ? 'up' : 'down');
    heroDailyEl.innerHTML = `วันนี้ <b>${dailyUp?'▲':'▼'} ${dailyUp?'+':''}$${fmt(dailyChange)} (${fmtPct(dailyPct)})</b>`;
  } else {
    heroDailyEl.style.display = 'none';
  }
}

function renderValueLineChart() {
  const card = document.getElementById('valueChartCard');
  const data = state.history.filter(h => h['Date'] && h['มูลค่าพอร์ต'] != null);
  if (data.length < 2) {
    card.innerHTML = `<div class="empty-state" style="padding:24px;"><div class="msg">ยังไม่มีข้อมูลย้อนหลังพอแสดงกราฟ</div></div>`;
    return;
  }

  const W = 600, H = 160, PAD_X = 8, PAD_TOP = 10, PAD_BOTTOM = 4;
  const values = data.map(d => Number(d['มูลค่าพอร์ต']));
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || 1;

  const xStep = (W - PAD_X * 2) / (data.length - 1);
  const points = values.map((v, i) => {
    const x = PAD_X + i * xStep;
    const y = PAD_TOP + (1 - (v - min) / range) * (H - PAD_TOP - PAD_BOTTOM);
    return [x, y];
  });

  const pathD = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const areaD = pathD + ` L${points[points.length-1][0].toFixed(1)},${H-PAD_BOTTOM} L${points[0][0].toFixed(1)},${H-PAD_BOTTOM} Z`;

  const last = values[values.length - 1];
  const first = values[0];
  const totalChange = last - first;
  const totalChangePct = first ? totalChange / first : 0;
  const up = totalChange >= 0;
  const lineColor = up ? '#1B7A4D' : '#B23B2E';

  const firstDate = new Date(data[0]['Date']).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
  const lastDate = new Date(data[data.length-1]['Date']).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

  card.innerHTML = `
    <div class="chart-meta">
      <div class="chart-meta-value">$${fmt(last)}</div>
      <div class="chart-meta-delta ${up?'up':'down'}">${up?'▲':'▼'} ${fmt(Math.abs(totalChange))} (${fmtPct(totalChangePct)})</div>
    </div>
    <div class="line-svg-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaD}" fill="url(#areaGrad)" stroke="none"/>
        <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${points[points.length-1][0].toFixed(1)}" cy="${points[points.length-1][1].toFixed(1)}" r="3.5" fill="${lineColor}"/>
      </svg>
    </div>
    <div class="chart-axis-labels"><span>${firstDate}</span><span>${lastDate}</span></div>
  `;
}

const PIE_COLORS = ['#C98A2C','#1B7A4D','#4A5160','#B23B2E','#7C9CBF','#A66BB5','#D4A95C','#5A8F7B','#9A6B4F','#6E7B8B'];

function renderBarChart() {
  const card = document.getElementById('barChartCard');
  const rows = getFilteredSummaryRows();
  if (!rows.length) {
    card.innerHTML = `<div class="empty-state" style="padding:24px;"><div class="msg">ยังไม่มีหุ้นให้แสดงสัดส่วน</div></div>`;
    return;
  }
  const sorted = [...rows].sort((a,b) => (Number(b['มูลค่าปัจจุบัน'])||0) - (Number(a['มูลค่าปัจจุบัน'])||0));
  const total = sorted.reduce((s,r) => s + (Number(r['มูลค่าปัจจุบัน'])||0), 0) || 1;
  const maxPct = Math.max(...sorted.map(r => (Number(r['มูลค่าปัจจุบัน'])||0) / total));

  const MAX_BAR_HEIGHT = 130; // px, leaves room for % label above and ticker label below

  const colsHtml = sorted.map((r, i) => {
    const value = Number(r['มูลค่าปัจจุบัน']) || 0;
    const pct = value / total;
    const heightPx = Math.max(3, (pct / (maxPct || 1)) * MAX_BAR_HEIGHT);
    const color = PIE_COLORS[i % PIE_COLORS.length];
    return `
      <div class="bar-col">
        <div class="bar-pct-label">${(pct*100).toFixed(1)}%</div>
        <div class="bar-fill" style="height:${heightPx.toFixed(0)}px;background:${color};"></div>
        <div class="bar-ticker-label">${r['หุ้น']}</div>
      </div>`;
  }).join('');

  card.innerHTML = `<div class="bar-chart-wrap">${colsHtml}</div>`;
}

function renderAllocList() {
  const el = document.getElementById('allocList');
  const rows = getFilteredSummaryRows();
  if (!rows.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📊</div><div class="msg">ยังไม่มีหุ้นให้แสดงสัดส่วน</div></div>`;
    return;
  }
  const basis = state.basis;
  const sorted = [...rows].sort((a,b) => (Number(b['มูลค่าปัจจุบัน'])||0) - (Number(a['มูลค่าปัจจุบัน'])||0));
  const total = sorted.reduce((s,r) => s + (Number(r['มูลค่าปัจจุบัน'])||0), 0) || 1;

  el.innerHTML = sorted.map((r, i) => {
    const value = Number(r['มูลค่าปัจจุบัน']) || 0;
    const pct = (value / total) * 100;
    const profit = basis === 'AVG' ? Number(r['กำไร AVG']) : Number(r['กำไร FIFO']);
    const profitPct = basis === 'AVG' ? Number(r['กำไร% AVG']) : Number(r['กำไร% FIFO']);
    const up = profit >= 0;
    const color = PIE_COLORS[i % PIE_COLORS.length];
    const ticker = r['หุ้น'];
    const inputVal = state.dcaInputs[ticker] || '';

    return `
      <div class="alloc-row-wrap">
        <div class="alloc-row">
          <div class="alloc-icon" style="background:${color}">${ticker.charAt(0)}</div>
          <div class="alloc-mid">
            <div class="alloc-ticker">${ticker}</div>
            <div class="alloc-bar-track"><div class="alloc-bar-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
            <div class="alloc-pct">${pct.toFixed(1)}% ของพอร์ต</div>
          </div>
          <div class="alloc-right">
            <div class="alloc-value">$${fmt(value)}</div>
            <div class="alloc-gain ${up?'up':'down'}">${up?'+':''}$${fmt(profit)} (${fmtPct(profitPct)})</div>
          </div>
        </div>
        <div class="dca-calc">
          <div class="dca-calc-input-row">
            <span class="dca-calc-label">DCA ลงเพิ่ม $</span>
            <input type="number" class="dca-calc-input" data-ticker="${ticker}" placeholder="0" inputmode="decimal" value="${inputVal}">
          </div>
          <div class="dca-calc-result" id="dcaResult-${ticker}">${renderDcaResultHtml(r, inputVal)}</div>
        </div>
      </div>`;
  }).join('');

  // ผูก event ให้ input คำนวณใหม่ทุกครั้งที่พิมพ์ (ไม่ reload ข้อมูลทั้งหน้า)
  el.querySelectorAll('.dca-calc-input').forEach(input => {
    input.addEventListener('input', (e) => {
      const ticker = e.target.dataset.ticker;
      const val = e.target.value;
      state.dcaInputs[ticker] = val;
      const row = sorted.find(r => r['หุ้น'] === ticker);
      const resultEl = document.getElementById(`dcaResult-${ticker}`);
      if (resultEl && row) resultEl.innerHTML = renderDcaResultHtml(row, val);
    });
  });
}

/**
 * คำนวณ DCA แบบ what-if: ถ้าลงเงินเพิ่ม $amount ที่ราคาตลาดปัจจุบัน
 * ค่าเฉลี่ยต้นทุนใหม่จะเป็นเท่าไหร่ และลดลงจากเดิมกี่ %
 * อ้างอิงสูตรเดียวกับ Sheet "My stocks": (เงินลงทุนเดิม + เงินใหม่) / (หุ้นเดิม + หุ้นใหม่)
 */
function renderDcaResultHtml(row, amountStr) {
  const currentPrice = Number(row['price']) || 0;
  const currentShares = Number(row['จำนวนหุ้น']) || 0;
  // ราคาที่ได้ (ต้นทุนเฉลี่ยปัจจุบัน) ใช้ค่าเดียวกับคอลัมน์ "ราคาที่ได้" ใน Sheet "My stocks"
  // ซึ่งตรงกับ "ราคา FIFO" ใน Summary ไม่ใช่ "ราคา AVG"
  const currentAvgCost = Number(row['ราคา FIFO']) || 0;
  const currentLine = `<div class="dca-current">ราคาที่ได้ปัจจุบัน: <b>$${fmt(currentAvgCost)}</b></div>`;

  const amount = Number(amountStr);
  if (!amountStr || isNaN(amount) || amount <= 0) {
    return `${currentLine}<span class="dca-calc-hint">พิมพ์จำนวนเงินเพื่อดูค่าเฉลี่ยต้นทุนใหม่</span>`;
  }
  if (currentPrice <= 0) {
    return `${currentLine}<span class="dca-calc-hint">ไม่มีราคาปัจจุบันสำหรับคำนวณ</span>`;
  }

  const newShares = amount / currentPrice;
  const newAvgCost = (currentShares * currentAvgCost + amount) / (currentShares + newShares);
  const diff = currentAvgCost - newAvgCost; // บวก = ต้นทุนลดลง, ลบ = ต้นทุนเพิ่มขึ้น
  const diffPct = currentAvgCost ? diff / currentAvgCost : 0;
  const isDrop = diff > 0;

  return `
    ${currentLine}
    ต้นทุนเฉลี่ยใหม่: <b>$${fmt(newAvgCost)}</b>
    <span class="dca-calc-drop ${isDrop?'down':'up'}">
      ${isDrop ? '↓ ลดลง' : '↑ เพิ่มขึ้น'} $${fmt(Math.abs(diff))} (${fmtPct(Math.abs(diffPct))})
    </span>
  `;
}

function renderTransactions() {
  const el = document.getElementById('txnList');
  const txns = state.transactions.filter(t => t['รายการ'] && t['รายการ'] !== 'USD').slice(0, 15);
  if (!txns.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><div class="msg">ยังไม่มีรายการ</div></div>`;
    return;
  }
  el.innerHTML = txns.map(t => {
    const isBuy = t['action'] === 'ซื้อ';
    const dateStr = t['Date'] ? new Date(t['Date']).toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'2-digit'}) : '';
    return `
      <div class="txn-row">
        <div class="txn-badge ${isBuy?'buy':'sell'}">${isBuy?'B':'S'}</div>
        <div class="txn-mid">
          <div class="txn-stock">${t['รายการ']}</div>
          <div class="txn-date">${dateStr} · ${t['Port']}</div>
        </div>
        <div class="txn-right">
          <div class="txn-amount">$${fmt(t['รวม $'])}</div>
          <div class="txn-shares">@ $${fmt(t['ราคา'])}</div>
        </div>
        <button class="txn-delete" data-row="${t['_row']}" data-stock="${t['รายการ']}" title="ลบรายการนี้">🗑</button>
      </div>`;
  }).join('');

  el.querySelectorAll('.txn-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      const row = btn.dataset.row;
      const stock = btn.dataset.stock;
      const confirmed = confirm(`ลบรายการ ${stock} นี้ออกจาก Sheet เลยไหม? การลบนี้ย้อนกลับไม่ได้`);
      if (!confirmed) return;

      btn.disabled = true;
      btn.textContent = '...';
      try {
        const result = await apiPost({ endpoint: 'deleteTransaction', row: row, stock: stock });
        if (result.success) {
          loadAll();
        } else {
          alert(result.error || 'ลบไม่สำเร็จ');
          btn.disabled = false;
          btn.textContent = '🗑';
        }
      } catch (err) {
        alert('เชื่อมต่อไม่สำเร็จ: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🗑';
      }
    });
  });
}

function populatePortSelect() {
  const sel = document.getElementById('fPort');
  sel.innerHTML = state.ports.map(p => `<option value="${p}">${p}</option>`).join('');
}

document.getElementById('basisToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.basis-btn-inline');
  if (!btn) return;
  document.querySelectorAll('.basis-btn-inline').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.basis = btn.dataset.basis;
  renderAllocList();
});

document.getElementById('valueModeToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.basis-btn');
  if (!btn) return;
  document.querySelectorAll('#valueModeToggle .basis-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.valueMode = btn.dataset.mode;
  renderHero();
});

const sheet = document.getElementById('addSheet');
const backdrop = document.getElementById('sheetBackdrop');

function openSheet() {
  document.getElementById('fDate').valueAsDate = new Date();
  sheet.classList.add('open');
  backdrop.classList.add('open');
}
function closeSheet() {
  sheet.classList.remove('open');
  backdrop.classList.remove('open');
  document.getElementById('formMsg').textContent = '';
  document.getElementById('formMsg').className = 'form-msg';
}
document.getElementById('fabAdd').onclick = openSheet;
document.getElementById('sheetClose').onclick = closeSheet;
backdrop.onclick = closeSheet;

let selectedAction = 'ซื้อ';
document.querySelector('.action-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.action-btn');
  if (!btn) return;
  document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedAction = btn.dataset.action;
});

document.getElementById('submitBtn').onclick = async () => {
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('formMsg');
  const port = document.getElementById('fPort').value;
  const stock = document.getElementById('fStock').value.trim().toUpperCase();
  const amount = document.getElementById('fAmount').value;
  const shares = document.getElementById('fShares').value;
  const date = document.getElementById('fDate').value;
  const note = document.getElementById('fNote').value.trim();

  if (!port || !stock || !amount || !shares) {
    msg.textContent = 'กรุณากรอกข้อมูลให้ครบ';
    msg.className = 'form-msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';
  msg.textContent = '';
  msg.className = 'form-msg';

  try {
    const result = await apiPost({
      endpoint: 'addTransaction',
      port,
      txnAction: selectedAction,
      stock, totalAmount: amount, shares, date, note
    });

    if (result.success) {
      msg.textContent = '✓ บันทึกสำเร็จ';
      msg.className = 'form-msg success';
      document.getElementById('fStock').value = '';
      document.getElementById('fAmount').value = '';
      document.getElementById('fShares').value = '';
      document.getElementById('fNote').value = '';
      setTimeout(() => { closeSheet(); loadAll(); }, 700);
    } else {
      msg.textContent = result.error || 'เกิดข้อผิดพลาด';
      msg.className = 'form-msg error';
    }
  } catch (err) {
    msg.textContent = 'เชื่อมต่อไม่สำเร็จ: ' + err.message;
    msg.className = 'form-msg error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'บันทึกรายการ';
  }
};

loadAll();
</script>
</body>
</html>
